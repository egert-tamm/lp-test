<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>star.io v3 — GLB Layer Debug</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; color: #fff; font-family: monospace; padding: 1rem; }
    h2 { margin-bottom: 1rem; font-size: 1rem; color: #888; }
    #grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.5rem;
    }
    .cell { text-align: center; }
    .cell canvas { width: 100% !important; height: auto !important; display: block; background: #1a1a1a; border-radius: 8px; }
    .label {
      margin-top: 0.4rem;
      font-size: 0.7rem;
      color: #0f0;
      word-break: break-all;
    }
    .label .num { color: #ff0; font-size: 0.9rem; }
    #status { margin-bottom: 1rem; color: #888; font-size: 0.8rem; }
    video {
      position: fixed;
      width: 1px; height: 1px;
      opacity: 0; top: 0; left: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <h2>GLB Layer Debug — each phone shows video on ONE material only. No rotation applied.</h2>
  <div id="status">Loading GLB…</div>
  <div id="grid"></div>

  <video id="src-vid"
    src="https://cdn.star.io/videos/screen-recording.mp4"
    autoplay muted loop playsinline crossorigin="anonymous">
  </video>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script>
    const vid = document.getElementById('src-vid');
    vid.play().catch(() => {});
    document.addEventListener('click', () => vid.play().catch(() => {}), { once: true });

    const loader = new THREE.GLTFLoader();
    loader.load('https://cdn.star.io/models/iphone17.glb', (gltf) => {

      // Collect all unique material names
      const matNames = new Set();
      gltf.scene.traverse(child => {
        if (!child.isMesh) return;
        const mats = Array.isArray(child.material) ? child.material : [child.material];
        mats.forEach(m => { if (m && m.name) matNames.add(m.name); });
      });

      const names = [...matNames];
      document.getElementById('status').textContent =
        `Found ${names.length} materials: ${names.join(', ')}`;

      const grid = document.getElementById('grid');

      names.forEach((targetName, i) => {
        // Clone scene for each instance
        const scene = gltf.scene.clone(true);

        // Video texture (fresh per instance)
        const videoTex = new THREE.VideoTexture(vid);
        videoTex.minFilter = THREE.LinearFilter;
        videoTex.magFilter = THREE.LinearFilter;
        videoTex.encoding = THREE.sRGBEncoding;

        // Apply video ONLY to the target material, everything else default
        scene.traverse(child => {
          if (!child.isMesh) return;
          const mats = Array.isArray(child.material)
            ? child.material.map(m => m ? m.clone() : m)
            : [child.material ? child.material.clone() : null];

          const newMats = mats.map(mat => {
            if (!mat) return mat;
            if (mat.name === targetName) {
              return new THREE.MeshBasicMaterial({
                map: videoTex,
                side: THREE.DoubleSide,
                toneMapped: false,
              });
            }
            return mat;
          });

          child.material = Array.isArray(child.material) ? newMats : newMats[0];
        });

        // Rotate to face front: model loads sideways (right side toward camera), -90° on Y fixes it
        scene.rotation.set(0, -Math.PI / 2, 0);
        scene.scale.setScalar(1.5);

        // Mini renderer
        const canvas = document.createElement('canvas');
        canvas.width = 300;
        canvas.height = 500;

        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
        renderer.setSize(300, 500);
        renderer.setClearColor(0x1a1a1a, 1);
        renderer.outputEncoding = THREE.sRGBEncoding;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;

        const camera = new THREE.PerspectiveCamera(38, 300 / 500, 0.01, 100);
        camera.position.set(0, 0, 4.5);

        const threeScene = new THREE.Scene();
        threeScene.background = new THREE.Color(0x1a1a1a);
        threeScene.add(new THREE.AmbientLight(0xffffff, 1.5));
        const key = new THREE.DirectionalLight(0xffffff, 2.2);
        key.position.set(3, 5, 5);
        threeScene.add(key);
        threeScene.add(scene);

        // Render loop
        (function render() {
          requestAnimationFrame(render);
          renderer.render(threeScene, camera);
        })();

        // Cell
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.appendChild(canvas);

        const label = document.createElement('div');
        label.className = 'label';
        label.innerHTML = `<span class="num">#${i + 1}</span> ${targetName}`;
        cell.appendChild(label);
        grid.appendChild(cell);
      });

    }, null, (err) => {
      document.getElementById('status').textContent = 'Error loading GLB: ' + err.message;
    });
  </script>
</body>
</html>
