<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>star</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      overflow: hidden;
      background-color: #000;
      background-image: url('https://cdn.star.io/images/bg.png');
      background-repeat: repeat-x;
      background-size: auto 100vh;
      background-position: top left;
    }
    #video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <video id="video" autoplay muted loop playsinline>
    <source src="https://cdn.star.io/videos/part-1_10_compressed_26-03-28-v2.mp4" type="video/mp4">
  </video>
</body>
</html>
