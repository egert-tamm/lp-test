<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>star.io v3 — screen.001 permutations</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; color: #fff; font-family: monospace; padding: 0.75rem; }
    #build { background:#ff0;color:#000;font-size:1rem;font-weight:900;padding:0.4rem 0.8rem;margin-bottom:0.5rem;border-radius:6px; }
    h2 { margin-bottom: 0.4rem; font-size: 0.8rem; color: #888; }
    #status { margin-bottom: 0.75rem; color: #0f0; font-size: 0.7rem; }
    #grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; }
    .cell { text-align: center; }
    .cell canvas { width: 100% !important; height: auto !important; display: block; background: #1a1a1a; border-radius: 6px; }
    .label { margin-top: 0.25rem; font-size: 0.55rem; color: #0f0; line-height: 1.3; }
    .label .num { color: #ff0; font-size: 0.8rem; font-weight: bold; display: block; }
    .vid-el { position: fixed; width: 2px; height: 2px; opacity: 0.01; top: 0; pointer-events: none; }
  </style>
</head>
<body>
  <div id="build">BUILD v55 · UV REMAP 90° ROTATION FIX · 2026-03-28</div>
  <h2>screen.001 only. #11+#12 from v52 now with corrected UV axis (Y→U, Z→V portrait).</h2>
  <div id="status">Loading…</div>
  <div id="grid"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script>
  const GLB_URL = 'https://cdn.star.io/models/iphone17.glb';
  const VID_URL = 'https://cdn.star.io/videos/screen-recording.mp4';
  const TARGET_MAT = 'screen.001';

  // UV remap helpers — project bounding box onto given axes
  function makeRemapFn(uAxis, vAxis, flipU, flipV) {
    return function(mesh) {
      const pos = mesh.geometry.attributes.position;
      const box = new THREE.Box3().setFromBufferAttribute(pos);
      const size = new THREE.Vector3(); box.getSize(size);
      const min = box.min;
      const uvArr = new Float32Array(pos.count * 2);
      const getU = uAxis === 'x' ? i => pos.getX(i) : uAxis === 'y' ? i => pos.getY(i) : i => pos.getZ(i);
      const getV = vAxis === 'x' ? i => pos.getX(i) : vAxis === 'y' ? i => pos.getY(i) : i => pos.getZ(i);
      const sU = uAxis === 'x' ? size.x : uAxis === 'y' ? size.y : size.z;
      const sV = vAxis === 'x' ? size.x : vAxis === 'y' ? size.y : size.z;
      const mU = uAxis === 'x' ? min.x : uAxis === 'y' ? min.y : min.z;
      const mV = vAxis === 'x' ? min.x : vAxis === 'y' ? min.y : min.z;
      for (let i = 0; i < pos.count; i++) {
        let u = (getU(i) - mU) / (sU || 1);
        let v = (getV(i) - mV) / (sV || 1);
        if (flipU) u = 1 - u;
        if (flipV) v = 1 - v;
        uvArr[i * 2]     = u;
        uvArr[i * 2 + 1] = v;
      }
      mesh.geometry = mesh.geometry.clone();
      mesh.geometry.setAttribute('uv', new THREE.BufferAttribute(uvArr, 2));
    };
  }

  const PERMS = [
    // v52 originals (sideways video confirmed)
    { label: 'v52 #11\nZ→U Y→V\nflipY=false', flipY: false, remap: makeRemapFn('z','y',false,false) },
    { label: 'v52 #12\nZ→U Y→V\nflipY=true',  flipY: true,  remap: makeRemapFn('z','y',false,false) },
    // 90° rotation fix: swap axes → Y→U, Z→V (portrait)
    { label: '⭐ Y→U Z→V\nflipY=false',        flipY: false, remap: makeRemapFn('y','z',false,false) },
    { label: '⭐ Y→U Z→V\nflipY=true',         flipY: true,  remap: makeRemapFn('y','z',false,false) },
    // Flip variants
    { label: '⭐ Y→U Z→V\nflipU\nflipY=false', flipY: false, remap: makeRemapFn('y','z',true,false)  },
    { label: '⭐ Y→U Z→V\nflipV\nflipY=false', flipY: false, remap: makeRemapFn('y','z',false,true)  },
    { label: '⭐ Y→U Z→V\nflipU+V\nflipY=false',flipY:false, remap: makeRemapFn('y','z',true,true)   },
    { label: '⭐ Y→U Z→V\nflipU+V\nflipY=true', flipY:true,  remap: makeRemapFn('y','z',true,true)   },
    // No remap baseline (original packed UVs)
    { label: 'No remap\nflipY=false\nsRGB',     flipY: false, remap: null },
  ];

  // Shared renderer
  const sharedCanvas = document.createElement('canvas');
  sharedCanvas.width = 280; sharedCanvas.height = 480;
  const sharedRenderer = new THREE.WebGLRenderer({ canvas: sharedCanvas, antialias: true, preserveDrawingBuffer: true });
  sharedRenderer.setSize(280, 480);
  sharedRenderer.outputEncoding = THREE.sRGBEncoding;
  sharedRenderer.toneMapping = THREE.ACESFilmicToneMapping;
  sharedRenderer.toneMappingExposure = 1.2;

  const cells = [];
  (function renderLoop() {
    requestAnimationFrame(renderLoop);
    cells.forEach(({ scene3, cam, ctx2d }) => {
      sharedRenderer.render(scene3, cam);
      ctx2d.drawImage(sharedCanvas, 0, 0);
    });
  })();

  fetch(GLB_URL)
    .then(r => r.arrayBuffer())
    .then(buffer => {
      document.getElementById('status').textContent = 'GLB fetched, spawning cells…';
      let done = 0;

      PERMS.forEach((perm, i) => {
        const vidEl = document.createElement('video');
        vidEl.className = 'vid-el';
        vidEl.src = VID_URL;
        vidEl.autoplay = true; vidEl.muted = true; vidEl.loop = true;
        vidEl.playsInline = true; vidEl.crossOrigin = 'anonymous';
        vidEl.style.left = (i * 3) + 'px';
        document.body.appendChild(vidEl);
        vidEl.play().catch(() => {});
        ['click','touchstart'].forEach(e => document.addEventListener(e, () => vidEl.play().catch(() => {}), {once:true}));

        const tex = new THREE.VideoTexture(vidEl);
        tex.minFilter = THREE.LinearFilter;
        tex.magFilter = THREE.LinearFilter;
        tex.generateMipmaps = false;
        tex.flipY = perm.flipY;
        tex.encoding = THREE.sRGBEncoding;

        if ('requestVideoFrameCallback' in vidEl) {
          const onFrame = () => { tex.needsUpdate = true; vidEl.requestVideoFrameCallback(onFrame); };
          vidEl.requestVideoFrameCallback(onFrame);
        } else {
          setInterval(() => { if (vidEl.readyState >= 2) tex.needsUpdate = true; }, 33);
        }

        const loader = new THREE.GLTFLoader();
        loader.parse(buffer.slice(0), '', (gltf) => {
          const model = gltf.scene;
          model.rotation.set(0, Math.PI / 2, 0);
          model.scale.setScalar(1.5);

          model.traverse(child => {
            if (!child.isMesh) return;
            const isArr = Array.isArray(child.material);
            const mats = isArr ? child.material : [child.material];
            const newMats = mats.map(mat => {
              if (!mat || mat.name !== TARGET_MAT) return mat;
              if (perm.remap) perm.remap(child);
              return new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide, toneMapped: false });
            });
            child.material = isArr ? newMats : newMats[0];
          });

          const scene3 = new THREE.Scene();
          scene3.background = new THREE.Color(0x1a1a1a);
          scene3.add(new THREE.AmbientLight(0xffffff, 1.5));
          const key = new THREE.DirectionalLight(0xffffff, 2.2);
          key.position.set(3, 5, 5); scene3.add(key);
          scene3.add(model);

          const cam = new THREE.PerspectiveCamera(38, 280/480, 0.01, 100);
          cam.position.set(0, 0, 4.5);

          const cellCanvas = document.createElement('canvas');
          cellCanvas.width = 280; cellCanvas.height = 480;
          const ctx2d = cellCanvas.getContext('2d');
          cells.push({ scene3, cam, ctx2d });

          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.appendChild(cellCanvas);
          const label = document.createElement('div');
          label.className = 'label';
          label.innerHTML = `<span class="num">#${i+1}</span>${perm.label.replace(/\n/g,'<br>')}`;
          cell.appendChild(label);
          document.getElementById('grid').appendChild(cell);

          done++;
          if (done === PERMS.length)
            document.getElementById('status').textContent = `✅ ${done} cells — TAP SCREEN to start video`;
        }, err => console.error(err));
      });
    });
  </script>
</body>
</html>
