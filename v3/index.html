<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>star.io — The Gaming &amp; Payments Platform</title>
  <!-- v57: correct flipU+flipV, aspect-ratio-preserving UV remap -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 400vh;
      background: #080808;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    #canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
    #loading {
      position: fixed; inset: 0;
      background: #080808;
      display: flex; align-items: center; justify-content: center;
      z-index: 20;
      transition: opacity 0.6s ease;
    }
    #loading .spinner {
      width: 36px; height: 36px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: rgba(255,255,255,0.6);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #content { position: relative; z-index: 1; pointer-events: none; }
    #content a { pointer-events: auto; }
    .hero {
      min-height: 100vh;
      display: flex; align-items: flex-end;
      padding: 0 5rem 8rem;
    }
    .hero .text-block {
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 16px;
      padding: 2.5rem 3rem;
      max-width: 520px;
    }
    h1 {
      font-size: clamp(2rem, 4vw, 3.5rem);
      font-weight: 700; letter-spacing: -0.02em; line-height: 1.08;
    }
    .hero p { margin-top: 0.85rem; font-size: 1rem; color: rgba(255,255,255,0.55); }
    .cta-button {
      display: inline-block; margin-top: 1.75rem;
      padding: 0.85rem 2.25rem;
      background: #fff; color: #080808;
      text-decoration: none; border-radius: 999px;
      font-size: 0.95rem; font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .cta-button:hover { transform: scale(1.04); box-shadow: 0 0 30px rgba(255,255,255,0.1); }
    #phone-video {
      position: fixed; width: 2px; height: 2px;
      opacity: 0.01; top: 0; left: 0; pointer-events: none;
    }
    @media (max-width: 768px) {
      .hero { padding: 0 1.5rem 4rem; align-items: flex-end; }
      .hero .text-block { padding: 1.75rem 1.75rem; }
    }
  </style>
</head>
<body>
  <div id="loading"><div class="spinner"></div></div>

  <video id="phone-video"
    src="https://cdn.star.io/videos/screen-recording.mp4"
    autoplay muted loop playsinline crossorigin="anonymous">
  </video>

  <canvas id="canvas"></canvas>

  <div id="content">
    <section class="hero">
      <div class="text-block">
        <h1>The Gaming &amp; Payments Platform</h1>
        <p>Powering the next generation of iGaming infrastructure.</p>
        <a href="mailto:hello@star.io" class="cta-button">Book a Demo →</a>
      </div>
    </section>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x080808);

    const camera = new THREE.PerspectiveCamera(38, innerWidth / innerHeight, 0.01, 100);
    camera.position.set(0, 0, 4.5);

    const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.outputEncoding = THREE.sRGBEncoding;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    renderer.physicallyCorrectLights = true;

    scene.add(new THREE.AmbientLight(0xffffff, 1.5));
    const key = new THREE.DirectionalLight(0xffffff, 2.2);
    key.position.set(3, 5, 5); scene.add(key);
    const fill = new THREE.DirectionalLight(0xb0c8ff, 0.8);
    fill.position.set(-4, 0, -2); scene.add(fill);

    const vid = document.getElementById('phone-video');

    // Confirmed working texture config (from debug grid v55 cell #7 + axis fix):
    // - generateMipmaps=false: non-POT video dims → silent black otherwise
    // - flipY=false: GLTFLoader pre-flips UVs
    // - remap Y→U, Z→V: screen.001 UV island is packed; planar projection fills full face
    // - no flip on U/V: flipU+flipV = 180° rotation (wrong); no flips = correct portrait
    // - requestVideoFrameCallback: explicit per-frame GPU upload (mobile-safe)
    const videoTex = new THREE.VideoTexture(vid);
    videoTex.minFilter = THREE.LinearFilter;
    videoTex.magFilter = THREE.LinearFilter;
    videoTex.generateMipmaps = false;
    videoTex.flipY = false;
    videoTex.encoding = THREE.sRGBEncoding;

    if ('requestVideoFrameCallback' in vid) {
      const onFrame = () => { videoTex.needsUpdate = true; vid.requestVideoFrameCallback(onFrame); };
      vid.requestVideoFrameCallback(onFrame);
    } else {
      setInterval(() => { if (vid.readyState >= 2) videoTex.needsUpdate = true; }, 33);
    }

    // UV remap: planar projection Y→U, Z→V, aspect-ratio-preserving (letterbox)
    // v55 cell #7 confirmed correct: flipU=true, flipV=true, flipY=false
    // Letterbox: scale UV so video fills longest axis without stretching
    function remapUVs(mesh) {
      const pos = mesh.geometry.attributes.position;
      const box = new THREE.Box3().setFromBufferAttribute(pos);
      const size = new THREE.Vector3(); box.getSize(size);
      // Screen mesh Y/Z extents
      const meshW = size.y, meshH = size.z;
      // screen-recording.mp4 is portrait (9:16 approx)
      const vidAR = 9 / 16;
      const meshAR = meshW / (meshH || 1);
      // Cover: scale UVs so video fills mesh face (crops edges, no letterbox)
      let scaleU = 1, scaleV = 1, offU = 0, offV = 0;
      if (meshAR > vidAR) {
        scaleV = meshAR / vidAR; offV = (1 - scaleV) / 2;
      } else {
        scaleU = vidAR / meshAR; offU = (1 - scaleU) / 2;
      }
      const uvArr = new Float32Array(pos.count * 2);
      for (let i = 0; i < pos.count; i++) {
        let u = (pos.getY(i) - box.min.y) / (meshW || 1);
        let v = (pos.getZ(i) - box.min.z) / (meshH || 1);
        u = 1 - (u * scaleU + offU); // flipU=true
        v = 1 - (v * scaleV + offV); // flipV=true
        uvArr[i * 2]     = u;
        uvArr[i * 2 + 1] = v;
      }
      mesh.geometry = mesh.geometry.clone();
      mesh.geometry.setAttribute('uv', new THREE.BufferAttribute(uvArr, 2));
    }

    const phoneGroup = new THREE.Group();
    phoneGroup.position.set(1.2, 0, 0);
    phoneGroup.rotation.set(0.1, Math.PI / 2 - 0.3, 0);
    scene.add(phoneGroup);

    const loader = new THREE.GLTFLoader();
    loader.load('https://cdn.star.io/models/iphone17.glb', (gltf) => {
      const model = gltf.scene;
      model.scale.setScalar(1.6);
      model.rotation.y = Math.PI / 2;

      model.traverse((child) => {
        if (!child.isMesh) return;
        const mats = Array.isArray(child.material) ? child.material : [child.material];
        mats.forEach((mat, idx) => {
          if (!mat) return;
          const name = mat.name || '';

          if (name === 'screen.001') {
            remapUVs(child);
            const vidMat = new THREE.MeshBasicMaterial({
              map: videoTex,
              side: THREE.DoubleSide,
              toneMapped: false,
            });
            if (Array.isArray(child.material)) child.material[idx] = vidMat;
            else child.material = vidMat;
            return;
          }

          if (name === 'glass.002' || name === 'lensinglass') {
            child.visible = false; return;
          }

          const bodyNames = ['basecolor.001', 'backpanel.001', 'Material.005', 'Material.006', 'Material.007', 'gray.001'];
          if (bodyNames.includes(name)) {
            mat.color?.set(0x1c1c1e);
            if (mat.metalness !== undefined) { mat.metalness = 0.7; mat.roughness = 0.25; }
          }

          if (name === 'metalframe.002' || name === 'metaL.001') {
            mat.color?.set(0x3a3a3c);
            if (mat.metalness !== undefined) { mat.metalness = 0.95; mat.roughness = 0.1; }
          }

          if (name === 'black.002') mat.color?.set(0x000000);
        });
      });

      phoneGroup.add(model);

      const loadEl = document.getElementById('loading');
      if (loadEl) { loadEl.style.opacity = '0'; setTimeout(() => loadEl.remove(), 600); }

      vid.load();
      vid.play().catch(() => {});

      gsap.registerPlugin(ScrollTrigger);
      const tl = gsap.timeline({
        scrollTrigger: { trigger: 'body', start: 'top top', end: 'bottom bottom', scrub: 1.5 }
      });

      tl.to(phoneGroup.position, { x: 0, duration: 1 }, 0)
        .to(phoneGroup.rotation, { y: Math.PI / 2, x: 0, duration: 1 }, 0);
      tl.to(phoneGroup.rotation, { y: Math.PI / 2 + Math.PI * 2, duration: 1 }, 1);
      tl.to(phoneGroup.rotation, { y: Math.PI / 2 + 0.3, x: -0.08, duration: 1 }, 2)
        .to(phoneGroup.position, { x: -1.2, duration: 1 }, 2);

    }, null, (err) => {
      console.error(err);
      const loadEl = document.getElementById('loading');
      if (loadEl) loadEl.style.opacity = '0';
    });

    ['click', 'touchstart'].forEach(e =>
      document.addEventListener(e, () => vid.play().catch(() => {}), { once: true })
    );

    (function render() { requestAnimationFrame(render); renderer.render(scene, camera); })();

    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
