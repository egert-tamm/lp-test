<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>star.io — The Gaming &amp; Payments Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #080808;
      color: #fff;
      font-family: 'Bricolage Grotesque', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    #canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; }
    /* canvas z:2, transparent — phone occludes word layer (z:1) naturally */

    #loading {
      position: fixed; inset: 0; background: #080808;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 20; transition: opacity 0.6s ease; gap: 1rem;
    }
    #loading .spinner {
      width: 36px; height: 36px;
      border: 2px solid rgba(255,255,255,0.1); border-top-color: rgba(255,255,255,0.6);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    #loading .load-label { font-size: 0.75rem; color: rgba(255,255,255,0.35); letter-spacing: 0.08em; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /*
      Layout: each slide = 200vh
        - First 100vh: text dominates, phone peeking at right edge
        - Second 100vh: phone slides to center, text fades, video visible
      The canvas is fixed — Three.js phone moves based on scroll progress within each slide
    */
    #sections { position: relative; z-index: 1; }

    .slide-text {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100vh;
      display: flex; align-items: flex-end;
      padding: 0 6vw 10vh;
      pointer-events: none;
      z-index: 2;
      opacity: 0;
      transform: translateY(40px);
      transition: none;
    }
    .slide-title {
      font-size: clamp(3.2rem, 10vw, 7rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 0.95;
      font-optical-sizing: auto;
      max-width: 70vw;
      will-change: transform, opacity;
    }
    .slide-title .word {
      display: inline-block;
      overflow: hidden;
    }
    .slide-title .word-inner {
      display: inline-block;
      transform: translateY(100%);
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .slide-text.visible .word-inner {
      transform: translateY(0);
    }
    .slide-title .word-inner:nth-child(2) { transition-delay: 0.06s; }
    .slide-title .word-inner:nth-child(3) { transition-delay: 0.12s; }

    /* Each slide is 200vh: 100vh for text reveal, 100vh for phone reveal */
    .slide { height: 200vh; }

    #phone-video {
      position: fixed; width: 1px; height: 1px;
      left: -200px; top: -200px; pointer-events: none;
    }

    /* ── HERO section (prepended before slides) ── */
    #hero-section { height: 300vh; }

    #hero-copy {
      position: sticky; top: 0;
      height: 100vh;
      display: flex; flex-direction: column;
      justify-content: center;     /* vertically centered ~top 40% area */
      align-items: center;         /* horizontally centered */
      text-align: center;
      padding: 0 6vw;
      pointer-events: none;
      z-index: 3;
    }
    #hero-copy h1 {
      font-size: clamp(64px, 13vw, 160px);
      font-weight: 800;
      font-style: italic;          /* italic, matching screenshot */
      text-transform: uppercase;
      line-height: 0.9;
      letter-spacing: -0.03em;
    }
    #hero-copy h1 .accent { color: #c8f55a; display: block; }
    .hero-cta {
      display: inline-flex; align-items: center; gap: 10px;
      margin-top: 36px;
      padding: 13px 24px;
      background: rgba(30,30,30,0.7);
      border: 1px solid rgba(255,255,255,0.22);
      backdrop-filter: blur(14px);
      border-radius: 100px;
      color: #fff; font-size: 14px; font-weight: 600;
      text-decoration: none; pointer-events: all;
      transition: background 0.2s;
    }
    .hero-cta:hover { background: rgba(60,60,60,0.8); }

    /* ── WORD SCROLL section ── */
    #word-section { height: 300vh; position: relative; }

    #word-layer {
      position: sticky; top: 0;
      height: 100vh;
      display: flex; align-items: center;
      overflow: hidden;
      z-index: 1; /* below canvas (z:2), so phone model occludes text */
      pointer-events: none;
    }
    #word-track {
      display: flex; align-items: baseline;
      gap: 0.4em; white-space: nowrap;
      will-change: transform;
    }
    .ww {
      font-size: clamp(100px, 18vw, 220px);
      font-weight: 800;
      font-style: italic;          /* italic to match screenshot */
      text-transform: uppercase;
      letter-spacing: -0.04em;
      line-height: 1;
    }
    .ww.white { color: rgba(255,255,255,0.9); }
    .ww.green { color: #c8f55a; }
    .ww.dot   { color: rgba(255,255,255,0.2); font-size: 0.4em; padding: 0 0.4em; }

    @media (max-width: 768px) {
      .slide-title { max-width: 85vw; }
      .slide-text { padding: 0 5vw 8vh; }
      .ww { font-size: clamp(70px, 22vw, 140px); }
    }
  </style>
</head>
<body>

  <div id="loading">
    <div class="spinner"></div>
    <div class="load-label">Loading…</div>
  </div>

  <video id="phone-video"
    src="https://cdn.star.io/videos/screen-recording.mp4"
    preload="auto" muted playsinline crossorigin="anonymous">
  </video>

  <canvas id="canvas"></canvas>

  <!-- ── HERO section ── -->
  <section id="hero-section">
    <div id="hero-copy">
      <h1>Bet Smarter<span class="accent">Win Faster</span></h1>
      <a href="#" class="hero-cta">
        <svg width="14" height="17" viewBox="0 0 14 17" fill="currentColor">
          <path d="M13.47 12.77c-.25.58-.55 1.11-.9 1.6-.47.67-.86 1.13-1.15 1.39-.46.42-.95.64-1.48.65-.38 0-.83-.11-1.36-.33-.53-.22-1.02-.33-1.46-.33-.46 0-.96.11-1.5.33-.54.22-.98.33-1.31.35-.52.01-1.01-.21-1.5-.66-.32-.29-.72-.77-1.21-1.45-.52-.72-.93-1.56-1.25-2.51C.09 10.86 0 9.86 0 8.9c0-1.07.23-1.99.7-2.76.37-.62.85-1.1 1.47-1.47.61-.37 1.27-.56 1.97-.56.39 0 .9.12 1.53.37.63.24 1.03.36 1.2.36.14 0 .62-.15 1.43-.43.76-.27 1.41-.38 1.95-.33 1.44.12 2.51.68 3.22 1.7-1.28.78-1.91 1.86-1.91 3.24.01 1.08.4 1.98 1.17 2.69.35.33.74.59 1.17.77-.09.27-.19.53-.31.79zM10.04.34c0 .84-.31 1.63-.93 2.37-.74.87-1.64 1.37-2.61 1.29a2.6 2.6 0 0 1-.02-.32c0-.82.36-1.69.99-2.4.32-.36.72-.67 1.21-.91.49-.24.95-.38 1.38-.4.01.12.01.25.01.37z"/>
        </svg>
        Download for iOS
      </a>
    </div>
  </section>

  <!-- ── WORD SCROLL section ── -->
  <section id="word-section">
    <div id="word-layer">
      <div id="word-track">
        <span class="ww white">BUILT</span>
        <span class="ww white">FOR</span>
        <span class="ww green">SPEED</span>
        <span class="ww dot">·</span>
        <span class="ww white">DESIGNED</span>
        <span class="ww white">FOR</span>
        <span class="ww green">EDGE</span>
        <span class="ww dot" style="padding:0 1em"></span>
        <span class="ww white">BUILT</span>
        <span class="ww white">FOR</span>
        <span class="ww green">SPEED</span>
      </div>
    </div>
  </section>

  <!-- Single fixed text overlay — content swaps as you scroll (existing slides) -->
  <div class="slide-text" id="slide-text">
    <div class="slide-title" id="slide-title"></div>
  </div>

  <div id="sections"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <script>
    const SLIDES = [
      'Introducing\nYapp App',
      'Find Your\nFast Edge',
      'Play What\'s\nTrending',
      'Bet Your Way',
      'AI When\nYou Want It',
      'Built-In\nNative Games',
      'Fast Deposits,\nFull Control',
      'Built Different',
      'Powered by AI',
      'Designed to Win',
      'Powered by\nYolo Investment',
    ];

    // Per-slide keyframes
    // style: 'slide' | 'spin' | 'zoom' | 'tilt' | 'float' | 'snap'
    // from: 'right' | 'left' | 'bottom' | 'top'
    const PHONE_KEYS = [
      { x:  0.3, y:  0.0, rotY: -0.15, camZ: 4.2, fov: 34, from: 'right',  style: 'zoom'  }, // 1 — rush in from distance
      { x: -0.3, y:  0.0, rotY:  0.15, camZ: 4.2, fov: 34, from: 'left',   style: 'spin'  }, // 2 — spin Y on entry
      { x:  0.0, y:  0.0, rotY:  0.0,  camZ: 3.6, fov: 30, from: 'bottom', style: 'float' }, // 3 — slow drift up
      { x:  0.4, y: -0.1, rotY: -0.2,  camZ: 4.5, fov: 36, from: 'right',  style: 'tilt'  }, // 4 — tilts in on Z axis
      { x:  0.0, y:  0.1, rotY:  0.0,  camZ: 3.8, fov: 32, from: 'top',    style: 'snap'  }, // 5 — snaps in fast
      { x: -0.3, y:  0.0, rotY:  0.2,  camZ: 4.2, fov: 35, from: 'left',   style: 'zoom'  }, // 6 — zoom from far
      { x:  0.0, y:  0.0, rotY:  0.0,  camZ: 3.2, fov: 28, from: 'bottom', style: 'tilt'  }, // 7 — tilts up
      { x:  0.3, y:  0.1, rotY: -0.15, camZ: 4.8, fov: 38, from: 'right',  style: 'spin'  }, // 8 — spin in
      { x:  0.0, y:  0.0, rotY:  0.0,  camZ: 4.0, fov: 34, from: 'left',   style: 'float' }, // 9 — drift
      { x: -0.2, y:  0.0, rotY:  0.1,  camZ: 3.8, fov: 32, from: 'top',    style: 'snap'  }, // 10 — snap
      { x:  0.0, y:  0.0, rotY:  0.0,  camZ: 4.5, fov: 36, from: 'bottom', style: 'zoom'  }, // 11 — final zoom
    ];

    // Start position per direction
    function hiddenPos(from) {
      switch(from) {
        case 'left':   return { x: -3.5, y:  0.0 };
        case 'bottom': return { x:  0.0, y: -4.5 };
        case 'top':    return { x:  0.0, y:  4.5 };
        default:       return { x:  3.5, y:  0.0 };
      }
    }
    function exitPos(from) {
      switch(from) {
        case 'left':   return { x:  3.5, y:  0.0 };
        case 'bottom': return { x:  0.0, y:  4.5 };
        case 'top':    return { x:  0.0, y: -4.5 };
        default:       return { x: -3.5, y:  0.0 };
      }
    }

    // Per-style easing & extra transforms
    function styleEase(style, t) {
      switch(style) {
        case 'snap':  return t < 0.7 ? (t/0.7)**3 : 1;           // slow then snap
        case 'float': return t * t * (3 - 2*t);                    // smoothstep, dreamy
        case 'zoom':  return 1 - Math.pow(1 - t, 3);              // ease-out cubic, rushes in
        case 'spin':  return t < 0.5 ? 2*t*t : -1+(4-2*t)*t;     // standard easeInOut
        case 'tilt':  return t;                                     // linear — tilt handled via rotZ
        default:      return t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
      }
    }
    // Extra rotation Z for tilt style
    function styleTiltZ(style, t) {
      if (style === 'tilt') return (1 - t) * 0.5;  // starts tilted, straightens
      return 0;
    }
    // Extra rotY for spin style (half rotation on entry)
    function styleSpinY(style, t, restRotY) {
      if (style === 'spin') return restRotY + (1 - t) * Math.PI * 0.6;
      return null;
    }
    // Zoom: starts far (camZ * 2), rushes to resting camZ
    function styleZoomCamZ(style, t, startCamZ, restCamZ) {
      if (style === 'zoom') return lerp(startCamZ * 2.2, restCamZ, t);
      return null;
    }

    const isMobileViewport = innerWidth < 768;
    const CAM_SCALE = isMobileViewport ? 1.2 : 1.0; // push camera back on mobile
    const PHONE_HIDDEN = { rotY: -0.3, camZ: 6.0 * CAM_SCALE, fov: 40 };

    // Build slide spacers
    const sectionsEl = document.getElementById('sections');
    SLIDES.forEach((_, i) => {
      const div = document.createElement('div');
      div.className = 'slide'; div.id = `slide-${i}`;
      sectionsEl.appendChild(div);
    });

    // Three.js
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(38, innerWidth / innerHeight, 0.01, 100);
    camera.position.set(0, 0, 4.5);
    const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true, alpha: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.outputEncoding = THREE.sRGBEncoding;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.4;
    renderer.physicallyCorrectLights = true;
    renderer.setClearColor(0x000000, 0); // fully transparent canvas so DOM word layer shows through
    // Background gradient goes on body; canvas is transparent
    document.body.style.background =
      'radial-gradient(ellipse at 60% 40%, #0d1f2d 0%, #080808 60%, #050505 100%)';

    scene.add(new THREE.AmbientLight(0x112233, 1.0));
    const key = new THREE.DirectionalLight(0xffffff, 3.0);
    key.position.set(4, 6, 5); scene.add(key);
    const fill = new THREE.DirectionalLight(0x4488ff, 1.2);
    fill.position.set(-5, 1, -3); scene.add(fill);
    const rim = new THREE.DirectionalLight(0x00ffcc, 0.6);
    rim.position.set(0, -4, -5); scene.add(rim);
    const glint = new THREE.PointLight(0xffffff, 2.5, 8);
    glint.position.set(2, 2, 3); scene.add(glint);

    // Particles
    (function() {
      const count = 220, pos = new Float32Array(count * 3), spd = new Float32Array(count);
      for (let i = 0; i < count; i++) {
        pos[i*3]=(Math.random()-.5)*12; pos[i*3+1]=(Math.random()-.5)*12; pos[i*3+2]=(Math.random()-.5)*8;
        spd[i] = 0.0003 + Math.random() * 0.0005;
      }
      const geo = new THREE.BufferGeometry(); geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      const mat = new THREE.PointsMaterial({ color: 0x336688, size: 0.035, sizeAttenuation: true, transparent: true, opacity: 0.55 });
      const pts = new THREE.Points(geo, mat);
      scene.add(pts); pts.userData.speeds = spd; pts.userData.positions = pos; scene.userData.particles = pts;
    })();

    // Glow plane
    const glowPlane = new THREE.Mesh(
      new THREE.PlaneGeometry(0.72, 1.55),
      new THREE.MeshBasicMaterial({ color: 0x00aaff, transparent: true, opacity: 0.0, depthWrite: false })
    );
    glowPlane.position.set(0, 0, 0.01);

    const vid = document.getElementById('phone-video');
    const videoTex = new THREE.VideoTexture(vid);
    videoTex.minFilter = THREE.LinearFilter; videoTex.magFilter = THREE.LinearFilter;
    videoTex.generateMipmaps = false; videoTex.flipY = false; videoTex.encoding = THREE.sRGBEncoding;
    let videoReady = false;
    vid.addEventListener('canplaythrough', () => { videoReady = true; }, { once: true });

    function remapUVs(mesh) {
      const pos = mesh.geometry.attributes.position;
      const box = new THREE.Box3().setFromBufferAttribute(pos);
      const size = new THREE.Vector3(); box.getSize(size);
      const meshW = size.y, meshH = size.z;
      const vidAR = (vid.videoWidth && vid.videoHeight) ? vid.videoWidth / vid.videoHeight : 576 / 1280;
      const meshAR = meshW / (meshH || 1);
      let scaleU = 1, scaleV = 1, offU = 0, offV = 0;
      if (meshAR > vidAR) { scaleV = meshAR / vidAR; offV = (1 - scaleV) / 2; }
      else { scaleU = vidAR / meshAR; offU = (1 - scaleU) / 2; }
      const uvArr = new Float32Array(pos.count * 2);
      for (let i = 0; i < pos.count; i++) {
        let u = (pos.getY(i) - box.min.y) / (meshW || 1);
        let v = (pos.getZ(i) - box.min.z) / (meshH || 1);
        u = 1 - (u * scaleU + offU); v = 1 - (v * scaleV + offV);
        uvArr[i*2] = u; uvArr[i*2+1] = v;
      }
      mesh.geometry = mesh.geometry.clone();
      mesh.geometry.setAttribute('uv', new THREE.BufferAttribute(uvArr, 2));
    }

    const phoneGroup = new THREE.Group();
    phoneGroup.position.set(PHONE_HIDDEN.x, PHONE_HIDDEN.y, 0);
    phoneGroup.rotation.set(0, PHONE_HIDDEN.rotY, 0);
    scene.add(phoneGroup);

    function lerp(a, b, t) { return a + (b - a) * t; }
    function eio(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

    const slideTitle = document.getElementById('slide-title');
    const slideTextEl = document.getElementById('slide-text');
    let currentSlideIdx = -1;

    const loader = new THREE.GLTFLoader();
    loader.load('https://cdn.star.io/models/iphone17.glb', (gltf) => {
      const model = gltf.scene;
      const isMobile = innerWidth < 768;
      model.scale.setScalar(isMobile ? 1.25 : 1.6);
      model.rotation.y = Math.PI / 2;
      model.traverse((child) => {
        if (!child.isMesh) return;
        const mats = Array.isArray(child.material) ? child.material : [child.material];
        mats.forEach((mat, idx) => {
          if (!mat) return; const name = mat.name || '';
          if (name === 'screen.001') {
            remapUVs(child);
            const vm = new THREE.MeshBasicMaterial({ map: videoTex, side: THREE.DoubleSide, toneMapped: false });
            if (Array.isArray(child.material)) child.material[idx] = vm; else child.material = vm; return;
          }
          if (name === 'glass.002' || name === 'lensinglass') { child.visible = false; return; }
          const body = ['basecolor.001','backpanel.001','Material.005','Material.006','Material.007','gray.001'];
          if (body.includes(name)) { mat.color?.set(0x1c1c1e); if (mat.metalness!==undefined){mat.metalness=0.7;mat.roughness=0.25;} }
          if (name==='metalframe.002'||name==='metaL.001') { mat.color?.set(0x3a3a3c); if(mat.metalness!==undefined){mat.metalness=0.95;mat.roughness=0.1;} }
          if (name==='black.002') mat.color?.set(0x000000);
        });
      });
      phoneGroup.add(model);
      phoneGroup.add(glowPlane);

      if (!vid.videoWidth) {
        vid.addEventListener('loadedmetadata', () => {
          model.traverse(child => {
            if (!child.isMesh) return;
            const m = Array.isArray(child.material) ? child.material : [child.material];
            if (m.some(x => x && x.map === videoTex)) remapUVs(child);
          });
        }, { once: true });
      }

      document.getElementById('loading').style.opacity = '0';
      setTimeout(() => document.getElementById('loading')?.remove(), 600);

      setupScroll();
    }, null, err => { console.error(err); document.getElementById('loading').style.opacity='0'; });

    function setSlideText(title) {
      // Split into words, each wrapped for mask animation
      const lines = title.split('\n');
      slideTitle.innerHTML = lines.map(line =>
        line.split(' ').map(word =>
          `<span class="word"><span class="word-inner">${word}</span></span>`
        ).join(' ')
      ).join('<br>');
    }

    function setupScroll() {
      gsap.registerPlugin(ScrollTrigger);

      /* ══════════════════════════════════════════════
         HERO SECTION — tilt → upright (300vh)
         Phone starts: tilted ~−38° on Z, bottom-right off-canvas
         0→50% scroll: rises + straightens, copy stays
         50→100%: copy fades up, phone locks to resting pos
      ══════════════════════════════════════════════ */
      const heroCopy   = document.getElementById('hero-copy');
      const heroSect   = document.getElementById('hero-section');

      // Initial phone pose — tilted ~-38deg Z, bottom-center off-canvas
      phoneGroup.position.set(0.0, -2.8, 0);
      phoneGroup.rotation.set(0, -0.1, -0.68); // -38deg Z tilt, facing mostly forward
      camera.position.z = 5.6;
      camera.fov = 40; camera.updateProjectionMatrix();

      // Hero rest position — centered, bottom half of screen (phone crops at bottom edge like screenshot)
      const heroRest = { x: 0.0, y: -0.4, rotY: 0.0, rotZ: 0, camZ: 3.6, fov: 32 };

      ScrollTrigger.create({
        trigger: '#hero-section',
        start: 'top top',
        end: 'bottom top',
        scrub: 0.9,
        onUpdate(self) {
          const p = self.progress;
          const clamp01 = v => Math.min(1, Math.max(0, v));
          const eOut3   = t => 1 - Math.pow(1-t, 3);
          const eInOut  = t => t < 0.5 ? 2*t*t : -1+(4-2*t)*t;

          if (p <= 0.5) {
            // Phase 1: phone tilts upright
            const t = eOut3(p / 0.5);
            phoneGroup.position.x = lerp(0.55,  heroRest.x, t);
            phoneGroup.position.y = lerp(-2.6,  heroRest.y, t);
            phoneGroup.rotation.z = lerp(-0.68, 0, t);
            phoneGroup.rotation.y = lerp(-0.18, heroRest.rotY, t);
            camera.position.z     = lerp(5.6,   heroRest.camZ, t);
            camera.fov            = lerp(40,     heroRest.fov, t);
            heroCopy.style.opacity  = '1';
            heroCopy.style.transform = 'translateY(0)';
          } else {
            // Phase 2: copy fades, phone stays at rest
            phoneGroup.position.x = heroRest.x;
            phoneGroup.position.y = heroRest.y;
            phoneGroup.rotation.z = 0;
            phoneGroup.rotation.y = heroRest.rotY;
            camera.position.z     = heroRest.camZ;
            camera.fov            = heroRest.fov;
            const t2 = eInOut((p - 0.5) / 0.5);
            heroCopy.style.opacity  = String(1 - t2);
            heroCopy.style.transform = `translateY(${-t2 * 36}px)`;
          }

          // Scrub video through first 55% of its duration during hero
          if (videoReady && vid.duration) {
            const target = p * vid.duration * 0.55;
            if (Math.abs(vid.currentTime - target) > 0.04) vid.currentTime = target;
            videoTex.needsUpdate = true;
          }
          camera.updateProjectionMatrix();
        }
      });

      /* ══════════════════════════════════════════════
         WORD SCROLL SECTION — horizontal marquee (300vh)
         Phone moves from hero rest → centered upright in first 15%
         Words sweep right→left across entire section
      ══════════════════════════════════════════════ */
      const wordTrack  = document.getElementById('word-track');
      const wordLayer  = document.getElementById('word-layer');
      const wordSect   = document.getElementById('word-section');
      const s2Rest     = { x: 0, y: 0, rotY: 0, rotZ: 0, camZ: 3.8, fov: 32 };

      // Calc word track width after first paint
      let trackW = 0;
      requestAnimationFrame(() => { trackW = wordTrack.scrollWidth; });

      ScrollTrigger.create({
        trigger: '#word-section',
        start: 'top top',
        end: 'bottom top',
        scrub: 0.85,
        onUpdate(self) {
          const p = self.progress;
          const eOut3 = t => 1 - Math.pow(1-t, 3);
          const eInOut = t => t < 0.5 ? 2*t*t : -1+(4-2*t)*t;

          // Phone: re-center in first 15%
          const pt = Math.min(1, p / 0.15);
          const et = eOut3(pt);
          phoneGroup.position.x = lerp(heroRest.x, s2Rest.x, et);
          phoneGroup.position.y = lerp(heroRest.y, s2Rest.y, et);
          phoneGroup.rotation.y = lerp(heroRest.rotY, 0, et);
          phoneGroup.rotation.z = lerp(0, 0, et);
          camera.position.z     = lerp(heroRest.camZ, s2Rest.camZ, et);
          camera.fov            = lerp(heroRest.fov, s2Rest.fov, et);
          camera.updateProjectionMatrix();

          // Words: start off right (30vw), exit off left
          if (trackW === 0) trackW = wordTrack.scrollWidth;
          const startX = window.innerWidth * 0.3;
          const endX   = -(trackW - window.innerWidth * 0.2);
          wordTrack.style.transform = `translateX(${lerp(startX, endX, eInOut(p))}px)`;

          // Scrub video: remaining 45% of video during word section
          if (videoReady && vid.duration) {
            const segStart = vid.duration * 0.55;
            const target   = segStart + p * (vid.duration * 0.45);
            if (Math.abs(vid.currentTime - target) > 0.04) vid.currentTime = target;
            videoTex.needsUpdate = true;
          }
        }
      });

      /* ══════════════════════════════════════════════
         Hide hero copy & word layer when not in their sections
         (so they don't overlap existing slides)
      ══════════════════════════════════════════════ */
      ScrollTrigger.create({
        trigger: '#sections',
        start: 'top top',
        onEnter:     () => { heroCopy.style.display = 'none'; wordLayer.style.opacity = '0'; },
        onEnterBack: () => { heroCopy.style.display = 'flex'; }
      });

      // ── show/hide word layer only during word section ──
      ScrollTrigger.create({
        trigger: '#word-section',
        start: 'top bottom',
        end: 'bottom top',
        onEnter:     () => { wordLayer.style.opacity = '1'; },
        onLeave:     () => { wordLayer.style.opacity = '0'; },
        onEnterBack: () => { wordLayer.style.opacity = '1'; },
        onLeaveBack: () => { wordLayer.style.opacity = '0'; }
      });

      // Show first slide text on load
      setSlideText(SLIDES[0]);
      currentSlideIdx = 0;
      gsap.fromTo(slideTextEl,
        { opacity: 0, y: 40 },
        { opacity: 1, y: 0, duration: 0.8, ease: 'power3.out', delay: 0.3 }
      );
      slideTextEl.querySelectorAll('.word-inner').forEach((el, wi) => {
        gsap.fromTo(el, { y: '100%' }, { y: '0%', duration: 0.6, ease: 'power3.out', delay: 0.3 + wi * 0.08 });
      });

      // Per-slide scroll trigger
      // Each slide is 200vh. First 100vh = text phase, second 100vh = phone phase.
      SLIDES.forEach((title, i) => {
        const key = PHONE_KEYS[i];

        // Phase 1: text fades in as slide enters, phone stays hidden (peeking)
        ScrollTrigger.create({
          trigger: `#slide-${i}`,
          start: 'top 80%',
          end: 'top top',
          onEnter: () => {
            if (currentSlideIdx !== i) {
              currentSlideIdx = i;
              // Slide old text out downward, swap, slide new text up
              gsap.to(slideTextEl, {
                opacity: 0, y: -30, duration: 0.25, ease: 'power2.in',
                onComplete: () => {
                  setSlideText(title);
                  gsap.fromTo(slideTextEl,
                    { opacity: 0, y: 50 },
                    { opacity: 1, y: 0, duration: 0.55, ease: 'power3.out' }
                  );
                  // Stagger word reveals
                  slideTextEl.querySelectorAll('.word-inner').forEach((el, wi) => {
                    gsap.fromTo(el,
                      { y: '100%' },
                      { y: '0%', duration: 0.55, ease: 'power3.out', delay: wi * 0.07 }
                    );
                  });
                }
              });
            }
          },
          onEnterBack: () => {
            currentSlideIdx = i;
            gsap.to(slideTextEl, {
              opacity: 0, y: 30, duration: 0.2, ease: 'power2.in',
              onComplete: () => {
                setSlideText(title);
                gsap.fromTo(slideTextEl,
                  { opacity: 0, y: -50 },
                  { opacity: 1, y: 0, duration: 0.5, ease: 'power3.out' }
                );
                slideTextEl.querySelectorAll('.word-inner').forEach((el, wi) => {
                  gsap.fromTo(el,
                    { y: '-100%' },
                    { y: '0%', duration: 0.5, ease: 'power3.out', delay: wi * 0.07 }
                  );
                });
              }
            });
          },
        });

        // Phase 2: phone slides in during second half, video scrubs
        const startPos = hiddenPos(key.from);
        const exitP    = exitPos(key.from);
        const restCamZ = key.camZ * CAM_SCALE;
        const restFov  = isMobileViewport ? Math.min(key.fov + 6, 50) : key.fov;
        ScrollTrigger.create({
          trigger: `#slide-${i}`,
          start: '50% top',
          end: 'bottom top',
          scrub: 0.6,
          onUpdate: (self) => {
            const raw = self.progress;
            const t = styleEase(key.style, raw);

            // Position
            phoneGroup.position.x = lerp(startPos.x, key.x, t);
            phoneGroup.position.y = lerp(startPos.y, key.y, t);

            // Rotation Y — spin style adds extra spin on top
            const spinY = styleSpinY(key.style, t, key.rotY);
            phoneGroup.rotation.y = spinY !== null ? spinY : lerp(PHONE_HIDDEN.rotY, key.rotY, t);

            // Rotation Z — tilt style
            phoneGroup.rotation.z = styleTiltZ(key.style, t);

            // Camera Z — zoom rushes from far
            const zoomZ = styleZoomCamZ(key.style, t, PHONE_HIDDEN.camZ, restCamZ);
            camera.position.z = zoomZ !== null ? zoomZ : lerp(PHONE_HIDDEN.camZ, restCamZ, t);
            camera.fov = lerp(PHONE_HIDDEN.fov, restFov, t);
            camera.updateProjectionMatrix();

            // Scrub video into this slide's segment
            if (videoReady && vid.duration) {
              const segStart = (i / SLIDES.length) * vid.duration;
              const segEnd   = ((i + 1) / SLIDES.length) * vid.duration;
              const target = segStart + t * (segEnd - segStart);
              if (Math.abs(vid.currentTime - target) > 0.04) vid.currentTime = target;
              videoTex.needsUpdate = true;
            }

            // Fade text out as phone comes in
            slideTextEl.style.opacity = String(1 - t * 0.5);
          },
          onLeave: () => {
            gsap.to(phoneGroup.position, { x: exitP.x, y: exitP.y, duration: 0.4, ease: 'power2.in' });
          },
          onEnterBack: () => {
            phoneGroup.position.set(startPos.x, startPos.y, 0);
            gsap.to(phoneGroup.position, { x: key.x, y: key.y, duration: 0.4, ease: 'power2.out' });
          },
        });
      });
    }

    // Mouse parallax
    let mouseX = 0, mouseY = 0, tMX = 0, tMY = 0;
    window.addEventListener('mousemove', e => { tMX=(e.clientX/innerWidth-.5)*2; tMY=(e.clientY/innerHeight-.5)*2; });
    let glintAngle = 0, lastTime = 0;

    (function render(now) {
      requestAnimationFrame(render);
      const dt = Math.min((now - lastTime) / 1000, 0.05); lastTime = now;
      mouseX += (tMX - mouseX) * 0.05; mouseY += (tMY - mouseY) * 0.05;
      phoneGroup.rotation.y += mouseX * 0.025;
      phoneGroup.rotation.x -= mouseY * 0.015;
      glintAngle += dt * 0.4;
      glint.position.set(Math.sin(glintAngle)*3.5, Math.cos(glintAngle*0.7)*2, 3);
      const t2 = now / 1000;
      glowPlane.material.opacity = 0.04 + Math.sin(t2 * 1.2) * 0.02;
      const pts = scene.userData.particles;
      if (pts) {
        const p = pts.userData.positions, s = pts.userData.speeds;
        for (let i = 0; i < s.length; i++) { p[i*3+1] += s[i]; if(p[i*3+1]>6)p[i*3+1]=-6; }
        pts.geometry.attributes.position.needsUpdate = true;
      }
      renderer.render(scene, camera);
    })(0);

    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
    ['click','touchstart'].forEach(e => document.addEventListener(e, () => vid.play().then(()=>vid.pause()).catch(()=>{}), {once:true}));
  </script>
</body>
</html>
