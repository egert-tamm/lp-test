<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>star.io v3 — screen.001 permutations</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; color: #fff; font-family: monospace; padding: 0.75rem; }
    #build { background:#ff0;color:#000;font-size:1rem;font-weight:900;padding:0.4rem 0.8rem;margin-bottom:0.5rem;border-radius:6px; }
    h2 { margin-bottom: 0.4rem; font-size: 0.8rem; color: #888; }
    #status { margin-bottom: 0.75rem; color: #0f0; font-size: 0.7rem; }
    #grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; }
    .cell { text-align: center; }
    .cell canvas { width: 100% !important; height: auto !important; display: block; background: #1a1a1a; border-radius: 6px; }
    .label { margin-top: 0.25rem; font-size: 0.55rem; color: #0f0; line-height: 1.3; }
    .label .num { color: #ff0; font-size: 0.8rem; font-weight: bold; display: block; }
    /* Video elements — all visible but tiny so autoplay works */
    .vid-el { position: fixed; width: 2px; height: 2px; opacity: 0.01; top: 0; pointer-events: none; }
  </style>
</head>
<body>
  <div id="build">BUILD v52 · UV REMAP Y/Z axis fix · 2026-03-28</div>
  <h2>All cells target screen.001 only. Different texture/material configs.</h2>
  <div id="status">Loading…</div>
  <div id="grid"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script>
  const GLB_URL = 'https://cdn.star.io/models/iphone17.glb';
  const VID_URL = 'https://cdn.star.io/videos/screen-recording.mp4';
  const TARGET_MAT = 'screen.001';

  // Permutations to test
  const PERMS = [
    { label: 'Basic\nflipY=false\nsRGB',              flipY: false, encoding: THREE.sRGBEncoding,   matType: 'basic'                         },
    { label: 'Basic\nflipY=true\nsRGB',               flipY: true,  encoding: THREE.sRGBEncoding,   matType: 'basic'                         },
    { label: 'Basic\nflipY=false\nLinear',            flipY: false, encoding: THREE.LinearEncoding, matType: 'basic'                         },
    { label: 'Basic\nflipY=true\nLinear',             flipY: true,  encoding: THREE.LinearEncoding, matType: 'basic'                         },
    { label: 'Std emissive\nflipY=false',             flipY: false, encoding: THREE.sRGBEncoding,   matType: 'emissive'                      },
    { label: 'Std emissive\nflipY=true',              flipY: true,  encoding: THREE.sRGBEncoding,   matType: 'emissive'                      },
    { label: 'Canvas tex\nflipY=false',               flipY: false, encoding: THREE.sRGBEncoding,   matType: 'canvas'                        },
    // UV offset/repeat approach — flips V in texture space (alt to geometry-baked flip)
    { label: 'repeat.y=-1\noffset.y=1\nflipY=true',  flipY: true,  encoding: THREE.sRGBEncoding,   matType: 'basic',  repeatFlip: true      },
    { label: 'repeat.y=-1\noffset.y=1\nflipY=false', flipY: false, encoding: THREE.sRGBEncoding,   matType: 'basic',  repeatFlip: true      },
    // FrontSide only
    { label: 'Basic\nFrontSide\nflipY=false',         flipY: false, encoding: THREE.sRGBEncoding,   matType: 'basic',  singleSide: true      },
    // UV REMAP (planar projection from bounding box — fixes packed UV island)
    { label: '⭐ UV REMAP\nflipY=false\nsRGB',         flipY: false, encoding: THREE.sRGBEncoding,   matType: 'basic',  uvRemap: true         },
    { label: '⭐ UV REMAP\nflipY=true\nsRGB',          flipY: true,  encoding: THREE.sRGBEncoding,   matType: 'basic',  uvRemap: true         },
    { label: '⭐ UV REMAP\nemissive\nflipY=false',      flipY: false, encoding: THREE.sRGBEncoding,   matType: 'emissive', uvRemap: true       },
  ];

  // Shared renderer
  const sharedCanvas = document.createElement('canvas');
  sharedCanvas.width = 280; sharedCanvas.height = 480;
  const sharedRenderer = new THREE.WebGLRenderer({ canvas: sharedCanvas, antialias: true, preserveDrawingBuffer: true });
  sharedRenderer.setSize(280, 480);
  sharedRenderer.outputEncoding = THREE.sRGBEncoding;
  sharedRenderer.toneMapping = THREE.ACESFilmicToneMapping;
  sharedRenderer.toneMappingExposure = 1.2;

  const cells = [];
  (function renderLoop() {
    requestAnimationFrame(renderLoop);
    cells.forEach(({ scene3, cam, ctx2d, tex, canvasSrc }) => {
      // For canvas-based tex: draw video frame to offscreen canvas each frame
      if (canvasSrc) {
        const { offCtx, vidEl } = canvasSrc;
        if (!vidEl.paused && vidEl.readyState >= 2) {
          offCtx.drawImage(vidEl, 0, 0, 280, 480);
          tex.needsUpdate = true;
        }
      }
      sharedRenderer.render(scene3, cam);
      ctx2d.drawImage(sharedCanvas, 0, 0);
    });
  })();

  fetch(GLB_URL)
    .then(r => r.arrayBuffer())
    .then(buffer => {
      document.getElementById('status').textContent = 'GLB fetched, spawning cells…';
      let done = 0;

      PERMS.forEach((perm, i) => {
        // Each perm gets its own <video> element (avoids sharing state)
        const vidEl = document.createElement('video');
        vidEl.className = 'vid-el';
        vidEl.src = VID_URL;
        vidEl.autoplay = true;
        vidEl.muted = true;
        vidEl.loop = true;
        vidEl.playsInline = true;
        vidEl.crossOrigin = 'anonymous';
        vidEl.style.left = (i * 3) + 'px';
        document.body.appendChild(vidEl);
        vidEl.play().catch(() => {});
        document.addEventListener('click',      () => vidEl.play().catch(() => {}), { once: true });
        document.addEventListener('touchstart', () => vidEl.play().catch(() => {}), { once: true });

        let tex, canvasSrc = null;

        if (perm.matType === 'canvas') {
          // Canvas-based texture: draw video frames manually → CanvasTexture
          const offCanvas = document.createElement('canvas');
          offCanvas.width = 280; offCanvas.height = 480;
          const offCtx = offCanvas.getContext('2d');
          tex = new THREE.CanvasTexture(offCanvas);
          tex.flipY = perm.flipY;
          tex.encoding = perm.encoding;
          tex.generateMipmaps = false;
          canvasSrc = { offCtx, vidEl };
        } else {
          tex = new THREE.VideoTexture(vidEl);
          tex.minFilter = THREE.LinearFilter;
          tex.magFilter = THREE.LinearFilter;
          tex.generateMipmaps = false;
          tex.flipY = perm.flipY;
          tex.encoding = perm.encoding;
          if (perm.repeatFlip) { tex.repeat.set(1, -1); tex.offset.set(0, 1); }
          // Explicitly drive texture upload via requestVideoFrameCallback (works on mobile Safari/Chrome)
          // Falls back to setInterval needsUpdate for browsers without rVFC support
          if ('requestVideoFrameCallback' in vidEl) {
            const onFrame = () => { tex.needsUpdate = true; vidEl.requestVideoFrameCallback(onFrame); };
            vidEl.requestVideoFrameCallback(onFrame);
          } else {
            setInterval(() => { if (vidEl.readyState >= 2) tex.needsUpdate = true; }, 33);
          }
        }

        const loader = new THREE.GLTFLoader();
        loader.parse(buffer.slice(0), '', (gltf) => {
          const model = gltf.scene;
          model.rotation.set(0, Math.PI / 2, 0);
          model.scale.setScalar(1.5);

          // UV remap helper: project bounding box onto XY plane (Z-facing screen)
          // Replaces packed UV island with full 0-1 coverage across the mesh face
          function remapUVs(mesh) {
            const pos = mesh.geometry.attributes.position;
            const box = new THREE.Box3().setFromBufferAttribute(pos);
            const size = new THREE.Vector3(); box.getSize(size);
            const min = box.min;
            const uvArr = new Float32Array(pos.count * 2);
            for (let i = 0; i < pos.count; i++) {
              // Screen faces +X in local space (model loads sideways) → project onto Y/Z plane
              uvArr[i * 2]     = (pos.getZ(i) - min.z) / (size.z || 1);
              uvArr[i * 2 + 1] = (pos.getY(i) - min.y) / (size.y || 1);
            }
            mesh.geometry = mesh.geometry.clone();
            mesh.geometry.setAttribute('uv', new THREE.BufferAttribute(uvArr, 2));
          }

          model.traverse(child => {
            if (!child.isMesh) return;
            const isArr = Array.isArray(child.material);
            const mats = isArr ? child.material : [child.material];
            const newMats = mats.map(mat => {
              if (!mat || mat.name !== TARGET_MAT) return mat;
              // If this perm requests UV remap, do it now
              if (perm.uvRemap) remapUVs(child);
              if (perm.matType === 'emissive') {
                const m = new THREE.MeshStandardMaterial({
                  emissiveMap: tex,
                  emissive: new THREE.Color(0xffffff),
                  side: THREE.DoubleSide,
                  toneMapped: false,
                });
                if (perm.repeatFlip) { tex.repeat.set(1, -1); tex.offset.set(0, 1); }
                return m;
              }
              return new THREE.MeshBasicMaterial({
                map: tex,
                side: perm.singleSide ? THREE.FrontSide : THREE.DoubleSide,
                toneMapped: false,
              });
            });
            child.material = isArr ? newMats : newMats[0];
          });

          const scene3 = new THREE.Scene();
          scene3.background = new THREE.Color(0x1a1a1a);
          scene3.add(new THREE.AmbientLight(0xffffff, 1.5));
          const key = new THREE.DirectionalLight(0xffffff, 2.2);
          key.position.set(3, 5, 5);
          scene3.add(key);
          scene3.add(model);

          const cam = new THREE.PerspectiveCamera(38, 280 / 480, 0.01, 100);
          cam.position.set(0, 0, 4.5);

          const cellCanvas = document.createElement('canvas');
          cellCanvas.width = 280; cellCanvas.height = 480;
          const ctx2d = cellCanvas.getContext('2d');

          const entry = { scene3, cam, ctx2d, tex, canvasSrc };
          if (perm.forceUpdate) {
            // Override push to force needsUpdate every frame
            const orig = Object.getOwnPropertyDescriptor(Object.getPrototypeOf(entry), 'tex');
            entry._forceUpdate = true;
          }
          cells.push(entry);

          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.appendChild(cellCanvas);
          const label = document.createElement('div');
          label.className = 'label';
          label.innerHTML = `<span class="num">#${i + 1}</span>${perm.label.replace(/\n/g, '<br>')}`;
          cell.appendChild(label);
          document.getElementById('grid').appendChild(cell);

          done++;
          if (done === PERMS.length) {
            document.getElementById('status').textContent = `✅ ${done} cells loaded — TAP SCREEN to start video`;
          }
        }, err => console.error(err));
      });
    });
  </script>
</body>
</html>
