<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>star.io v3 — GLB Layer Debug</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; color: #fff; font-family: monospace; padding: 1rem; }
    h2 { margin-bottom: 0.5rem; font-size: 0.9rem; color: #888; }
    #status { margin-bottom: 1rem; color: #0f0; font-size: 0.75rem; word-break: break-all; }
    #grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
    }
    .cell { text-align: center; }
    .cell canvas { width: 100% !important; height: auto !important; display: block; background: #1a1a1a; border-radius: 6px; }
    .label { margin-top: 0.3rem; font-size: 0.65rem; color: #0f0; word-break: break-all; }
    .label .num { color: #ff0; font-size: 0.85rem; font-weight: bold; }
    video {
      position: fixed; width: 1px; height: 1px;
      opacity: 0; top: 0; left: 0; pointer-events: none;
    }
  </style>
</head>
<body>
  <h2>GLB Layer Debug — phone front-facing (+PI/2), video on each material separately. Tell me which number shows video on the SCREEN.</h2>
  <div id="status">Loading GLB…</div>
  <div id="grid"></div>

  <video id="src-vid"
    src="https://cdn.star.io/videos/screen-recording.mp4"
    autoplay muted loop playsinline crossorigin="anonymous">
  </video>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script>
    const vid = document.getElementById('src-vid');
    vid.play().catch(() => {});
    document.addEventListener('click', () => vid.play().catch(() => {}), { once: true });
    document.addEventListener('touchstart', () => vid.play().catch(() => {}), { once: true });

    const loader = new THREE.GLTFLoader();
    loader.load('https://cdn.star.io/models/iphone17.glb', (gltf) => {

      // Collect all unique material names
      const matNames = new Set();
      gltf.scene.traverse(child => {
        if (!child.isMesh) return;
        const mats = Array.isArray(child.material) ? child.material : [child.material];
        mats.forEach(m => { if (m && m.name) matNames.add(m.name); });
      });

      const names = [...matNames];
      document.getElementById('status').textContent =
        `${names.length} materials found: ${names.join(' | ')}`;

      const grid = document.getElementById('grid');

      names.forEach((targetName, i) => {
        const scene = gltf.scene.clone(true);

        // Video texture per instance
        const videoTex = new THREE.VideoTexture(vid);
        videoTex.minFilter = THREE.LinearFilter;
        videoTex.magFilter = THREE.LinearFilter;
        videoTex.encoding = THREE.sRGBEncoding;

        // Apply video ONLY to target material
        scene.traverse(child => {
          if (!child.isMesh) return;
          const isArray = Array.isArray(child.material);
          const mats = isArray ? child.material : [child.material];
          const newMats = mats.map(mat => {
            if (!mat) return mat;
            if (mat.name === targetName) {
              return new THREE.MeshBasicMaterial({
                map: videoTex,
                side: THREE.DoubleSide,
                toneMapped: false,
              });
            }
            return mat.clone ? mat.clone() : mat;
          });
          child.material = isArray ? newMats : newMats[0];
        });

        // +PI/2 = front facing (confirmed: model loads with right side toward camera)
        scene.rotation.set(0, Math.PI / 2, 0);
        scene.scale.setScalar(1.5);

        const canvas = document.createElement('canvas');
        canvas.width = 280;
        canvas.height = 480;

        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(280, 480);
        renderer.setClearColor(0x1a1a1a, 1);
        renderer.outputEncoding = THREE.sRGBEncoding;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;

        const cam = new THREE.PerspectiveCamera(38, 280 / 480, 0.01, 100);
        cam.position.set(0, 0, 4.5);

        const threeScene = new THREE.Scene();
        threeScene.background = new THREE.Color(0x1a1a1a);
        threeScene.add(new THREE.AmbientLight(0xffffff, 1.5));
        const key = new THREE.DirectionalLight(0xffffff, 2.2);
        key.position.set(3, 5, 5);
        threeScene.add(key);
        threeScene.add(scene);

        (function render() {
          requestAnimationFrame(render);
          renderer.render(threeScene, cam);
        })();

        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.appendChild(canvas);

        const label = document.createElement('div');
        label.className = 'label';
        label.innerHTML = `<span class="num">#${i + 1}</span> ${targetName}`;
        cell.appendChild(label);
        grid.appendChild(cell);
      });

    }, null, (err) => {
      document.getElementById('status').textContent = 'GLB load error: ' + err.message;
    });
  </script>
</body>
</html>
