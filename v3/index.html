<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>star.io — The Gaming &amp; Payments Platform</title>

  <link rel="stylesheet" href="https://use.typekit.net/qef6ztd.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&family=DM+Sans:wght@600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background-color: #080808;
      color: #fff;
      font-family: "obviously-variable", sans-serif;
      overflow-x: clip;
      -webkit-font-smoothing: antialiased;
    }
    #canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 4; } /* above feature text */

    #loading {
      position: fixed; inset: 0; background: #080808;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 20; transition: opacity 0.6s ease; gap: 1rem;
    }
    #loading .spinner {
      width: 36px; height: 36px;
      border: 2px solid rgba(255,255,255,0.1); border-top-color: rgba(255,255,255,0.6);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    #loading .load-label { font-size: 0.75rem; color: rgba(255,255,255,0.35); letter-spacing: 0.08em; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /*
      Layout: each slide = 200vh
        - First 100vh: text dominates, phone peeking at right edge
        - Second 100vh: phone slides to center, text fades, video visible
      The canvas is fixed — Three.js phone moves based on scroll progress within each slide
    */
    #sections { position: relative; z-index: 1; }

    .slide-text {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100vh;
      display: flex; align-items: flex-end;
      padding: 0 6vw 10vh;
      pointer-events: none;
      z-index: 2;
      opacity: 0;
      transform: translateY(40px);
      transition: none;
    }
    .slide-title {
      font-size: clamp(3.2rem, 10vw, 7rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 0.95;
      font-optical-sizing: auto;
      max-width: 70vw;
      will-change: transform, opacity;
    }
    .slide-title .word {
      display: inline-block;
      overflow: hidden;
    }
    .slide-title .word-inner {
      display: inline-block;
      transform: translateY(100%);
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .slide-text.visible .word-inner {
      transform: translateY(0);
    }
    .slide-title .word-inner:nth-child(2) { transition-delay: 0.06s; }
    .slide-title .word-inner:nth-child(3) { transition-delay: 0.12s; }

    /* Each slide is 150vh: tighter scroll budget per slide */
    .slide { height: 150vh; }

    #phone-video {
      position: fixed; width: 1px; height: 1px;
      left: -200px; top: -200px; pointer-events: none;
    }

    /* ── HERO section (prepended before slides) ── */
    #hero-section { height: 300vh; position: relative; z-index: 1; }
    #sections { position: relative; z-index: 1; }

    /* ── WORD SECTION ── */
    #word-section { height: 300vh; position: relative; }

    /* ── FEATURE SECTION (after word scroll) ── */
    #feature-section {
      height: 700vh; /* 6 lines × ~100vh each + exit room */
      position: relative;
      z-index: 3;
    }
    #feature-inner {
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      padding: 0 6.3vw;
      pointer-events: none;
    }
    #feature-copy {
      display: flex;
      flex-direction: column;
      gap: 0;
      width: 71vw; /* matches Figma 1364/1920 = 71% */
      pointer-events: none;
    }
    /* Feature lines — desktop SVG shown by default, mobile hidden */
    .fl-mobile { display: none; }
    .fl-desktop { display: block; }
    @media (orientation: portrait) {
      .fl-mobile { display: block; }
      .fl-desktop { display: none; }
    }

    /* Feature lines — Figma SVG assets */
    .feature-line {
      opacity: 0.22;
      transition: opacity 0.35s ease;
      margin-bottom: -3px;
    }
    /* Each SVG keeps natural width, fixed height so all lines are same size */
    .feature-line svg {
      width: auto !important;
      height: 8.5vh;
      max-width: 100%;
      display: block;
    }
    @media (orientation: portrait) {
      .feature-line svg {
        height: 4.5vw;
        min-height: 22px;
      }
    }
    .feature-line.active {
      opacity: 1;
    }
    #watch-video-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 40px;
      padding: 0 24px;
      height: 64px;
      background: #9EFF78;
      border-radius: 9999px;
      color: #080808;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      pointer-events: all;
      cursor: pointer;
      border: none;
      font-family: "obviously-variable", sans-serif;
      box-shadow: 0 1px 2px rgba(0,0,0,0.12), 0 1px 1px rgba(0,0,0,0.12);
      transition: opacity 0.2s;
    }
    #watch-video-btn:hover { opacity: 0.85; }
    #watch-video-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* Portrait / mobile — section 3 */
    @media (orientation: portrait) {
      #feature-inner {
        flex-direction: column;
        justify-content: flex-start;
        align-items: center;
        padding: 12vh 5vw 0;
        gap: 0;
      }
      #feature-copy {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }
      /* Mobile: feature lines centered, tighter gap */
      .feature-line {
        margin-bottom: 4px;
      }
      #feature-btn-wrap {
        width: 100%;
        display: flex;
        justify-content: center;
        margin-top: 28px;
      }
      #watch-video-btn {
        width: 84vw;
        max-width: 328px;
        justify-content: center;
        font-size: 17px;
        height: 60px;
      }
    }

    /* ── SECTION 4: Coming Soon Marquee ── */
    #cs-section {
      position: relative;
      height: 100vh;
      min-height: 500px;
      background: #000;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      z-index: 3;
      /* Final section — no content below */
      scroll-snap-align: start;
    }
    /* Decorative diamond/cross particles */
    #cs-particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .cs-particle {
      position: absolute;
      color: rgba(158,255,120,0.28);
      font-size: 14px;
      line-height: 1;
      user-select: none;
    }
    /* Logo — top center on mobile, top left on desktop */
    #cs-logo {
      position: absolute;
      top: 20px;
      left: 28px;
      z-index: 2;
      width: 100px;
      height: auto;
      opacity: 0.9;
    }
    #cs-logo svg { width: 100%; height: auto; display: block; }
    /* Marquee — vertically centered, no tilt */
    #cs-marquee-wrap {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      transform: translateY(-50%);
      z-index: 1;
      overflow: hidden;
      width: 100%;
    }
    #cs-marquee-track {
      display: flex;
      white-space: nowrap;
      will-change: transform;
    }
    .cs-marquee-item {
      display: inline-block;
      flex-shrink: 0;
      font-family: "obviously-variable", sans-serif;
      font-weight: 800;
      font-style: italic;
      text-transform: uppercase;
      letter-spacing: -0.04em;
      color: #fff;
      font-size: clamp(80px, 13vw, 220px);
      line-height: 1.1;
      padding-right: 0.3em;
    }
    /* Telegram join button */
    #cs-tg-btn {
      position: absolute;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.18);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      text-decoration: none;
    }
    #cs-tg-btn:hover { background: rgba(255,255,255,0.18); transform: translateX(-50%) scale(1.08); }
    #cs-tg-btn svg { width: 24px; height: 24px; }
    /* Footer */
    #cs-footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 2;
      padding: 18px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid rgba(255,255,255,0.08);
      flex-wrap: wrap;
      gap: 8px;
    }
    #cs-footer-copy {
      font-family: "DM Sans", sans-serif;
      font-size: 13px;
      color: rgba(255,255,255,0.35);
    }
    #cs-footer-links {
      display: flex;
      gap: 16px;
      align-items: center;
    }
    #cs-footer-divider {
      width: 1px;
      height: 14px;
      background: rgba(255,255,255,0.2);
    }
    #cs-footer-links a {
      font-family: "DM Sans", sans-serif;
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      text-decoration: none;
      transition: color 0.2s;
    }
    #cs-footer-links a:hover { color: rgba(255,255,255,0.8); }
    @media (orientation: portrait) {
      #cs-logo { left: 50%; transform: translateX(-50%); width: 80px; top: 20px; }
      #cs-marquee-wrap { transform: translateY(-50%); }
      .cs-marquee-item { font-size: clamp(64px, 22vw, 120px); }
      #cs-tg-btn { bottom: 80px; }
      #cs-footer { flex-direction: column; align-items: center; gap: 6px; padding: 14px 16px; }
      #cs-footer-copy, #cs-footer-links a { font-size: 12px; }
    }

    /* Word overlay: fixed to viewport, driven purely by JS scroll progress */
    #word-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;   /* below canvas (z:2) — phone occludes words */
      display: none;
      overflow: visible;
    }
    .word-line {
      position: absolute;
      top: 0; left: 0;
      white-space: nowrap;
      width: max-content;
      padding-right: 2vw;
      font-family: "obviously-variable", sans-serif;
      font-size: clamp(60px, 11vw, 140px);
      font-weight: 800;
      font-style: italic;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      line-height: 1.12;
      will-change: transform;
    }
    #word-line-1 { color: rgba(255,255,255,0.9); }
    #word-line-2 { color: #9EFF78; }

    #hero-copy {
      position: sticky; top: 0;
      height: 100vh;
      display: flex; flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      text-align: center;
      padding: 12vh 6vw 0;
      pointer-events: none;
      z-index: 10;   /* above canvas (z:2) */
    }
    #hero-copy h1 {
      font-family: "obviously-variable", sans-serif;
      font-size: clamp(2.2rem, 8vw, 6rem);
      font-weight: 800;
      font-style: italic;
      
      letter-spacing: -0.02em;
      line-height: 1.12;
      text-transform: uppercase;
    }
    #hero-copy h1 .accent { color: #fff; display: block; }
    .coming-soon-badge {
      position: relative;
      display: inline-block;
      padding: 10px 16px;
      border-radius: 999px;
      font-family: "DM Sans", sans-serif;
      font-size: 14px;
      font-weight: 600;
      line-height: 1;
      color: rgba(255,255,255,0.64);
      letter-spacing: 0;
      /* Pure white 8% fill — no pink */
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow:
        0 1px 2px 0 rgba(0,0,0,0.12),
        0 0 1px 0 rgba(0,0,0,0.12);
      margin-bottom: 18px;
      z-index: 0;
    }
    /* Gradient border via pseudo-element — completely separate from fill */
    .coming-soon-badge::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 999px;
      padding: 1px; /* border width */
      background: linear-gradient(to right, rgba(255,120,242,0.12), rgba(255,120,242,0));
      -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }
    .hero-cta {
      display: inline-flex; align-items: center; gap: 10px;
      margin-top: 36px;
      padding: 13px 24px;
      background: rgba(30,30,30,0.7);
      border: 1px solid rgba(255,255,255,0.22);
      backdrop-filter: blur(14px);
      border-radius: 100px;
      color: #fff; font-size: 14px; font-weight: 600;
      text-decoration: none; pointer-events: all;
      transition: background 0.2s;
    }
    .hero-cta:hover { background: rgba(60,60,60,0.8); }

    /* Yolo logo */
    #yolo-logo {
      position: fixed; top: 16px; left: 16px;
      z-index: 20; pointer-events: none;
      width: 130px; height: auto;
      opacity: 1;
    }
    #yolo-logo svg { width: 100%; height: auto; display: block; }
    @media (orientation: portrait) {
      #yolo-logo {
        left: 50%;
        transform: translateX(-50%);
      }
    }
    @media (max-width: 768px) {
      .slide-title { max-width: 85vw; }
      .slide-text { padding: 0 5vw 8vh; }
      .word-line { font-size: clamp(32px, 8vw, 60px); }
      #hero-copy { padding-top: 8vh; }
    }
    @media (orientation: portrait) {
      .word-line { font-size: clamp(56px, 18vw, 120px); }
      #hero-copy {
        justify-content: flex-start;
        padding-top: 18vh;
        padding-bottom: 0;
      }
      #hero-copy h1 {
        font-size: clamp(2.8rem, 11vw, 5rem);
      }
    }


    /* SVG background */

  </style>
</head>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <script>
    const SLIDES = [
      'Introducing\nYapp App',
      'Find Your\nFast Edge',
      'Play What\'s\nTrending',
      'Bet Your Way',
    ];

    // Per-slide keyframes
    const PHONE_KEYS = [
      { x:  0.3, y:  0.0, rotY: -0.15, camZ: 4.2, fov: 34, from: 'right',  style: 'zoom'  }, // 1
      { x: -0.3, y:  0.0, rotY:  0.15, camZ: 4.2, fov: 34, from: 'left',   style: 'spin'  }, // 2
      { x:  0.0, y:  0.0, rotY:  0.0,  camZ: 3.6, fov: 30, from: 'bottom', style: 'float' }, // 3
      { x:  0.4, y: -0.1, rotY: -0.2,  camZ: 4.5, fov: 36, from: 'right',  style: 'tilt'  }, // 4
    ];

    // Start position per direction
    function hiddenPos(from) {
      switch(from) {
        case 'left':   return { x: -3.5, y:  0.0 };
        case 'bottom': return { x:  0.0, y: -4.5 };
        case 'top':    return { x:  0.0, y:  4.5 };
        default:       return { x:  3.5, y:  0.0 };
      }
    }
    function exitPos(from) {
      switch(from) {
        case 'left':   return { x:  3.5, y:  0.0 };
        case 'bottom': return { x:  0.0, y:  4.5 };
        case 'top':    return { x:  0.0, y: -4.5 };
        default:       return { x: -3.5, y:  0.0 };
      }
    }

    // Per-style easing & extra transforms
    function styleEase(style, t) {
      switch(style) {
        case 'snap':  return t < 0.7 ? (t/0.7)**3 : 1;           // slow then snap
        case 'float': return t * t * (3 - 2*t);                    // smoothstep, dreamy
        case 'zoom':  return 1 - Math.pow(1 - t, 3);              // ease-out cubic, rushes in
        case 'spin':  return t < 0.5 ? 2*t*t : -1+(4-2*t)*t;     // standard easeInOut
        case 'tilt':  return t;                                     // linear — tilt handled via rotZ
        default:      return t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
      }
    }
    // Extra rotation Z for tilt style
    function styleTiltZ(style, t) {
      if (style === 'tilt') return (1 - t) * 0.5;  // starts tilted, straightens
      return 0;
    }
    // Extra rotY for spin style (half rotation on entry)
    function styleSpinY(style, t, restRotY) {
      if (style === 'spin') return restRotY + (1 - t) * Math.PI * 0.6;
      return null;
    }
    // Zoom: starts far (camZ * 2), rushes to resting camZ
    function styleZoomCamZ(style, t, startCamZ, restCamZ) {
      if (style === 'zoom') return lerp(startCamZ * 2.2, restCamZ, t);
      return null;
    }

    const isMobileViewport = innerWidth < 768;
    const CAM_SCALE = isMobileViewport ? 1.2 : 1.0; // push camera back on mobile
    const PHONE_HIDDEN = { x: 0, y: 0, rotY: -0.3, camZ: 6.0 * CAM_SCALE, fov: 40 };

    // Build slide spacers
    const sectionsEl = document.getElementById('sections');
    SLIDES.forEach((_, i) => {
      const div = document.createElement('div');
      div.className = 'slide'; div.id = `slide-${i}`;
      sectionsEl.appendChild(div);
    });

    // Three.js
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(38, innerWidth / innerHeight, 0.01, 100);
    window.camera = camera;
    camera.position.set(0, 0, 4.5);
    const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true, alpha: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.outputEncoding = THREE.sRGBEncoding;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.4;
    renderer.physicallyCorrectLights = true;
    renderer.setClearColor(0x000000, 0); // fully transparent canvas so DOM word layer shows through
    // Background handled by CSS on body

    scene.add(new THREE.AmbientLight(0x112233, 1.0));
    const key = new THREE.DirectionalLight(0xffffff, 3.0);
    key.position.set(4, 6, 5); scene.add(key);
    const fill = new THREE.DirectionalLight(0x4488ff, 1.2);
    fill.position.set(-5, 1, -3); scene.add(fill);
    const rim = new THREE.DirectionalLight(0x00ffcc, 0.6);
    rim.position.set(0, -4, -5); scene.add(rim);
    const glint = new THREE.PointLight(0xffffff, 2.5, 8);
    glint.position.set(2, 2, 3); scene.add(glint);



    // Glow plane
    const glowPlane = new THREE.Mesh(
      new THREE.PlaneGeometry(0.72, 1.55),
      new THREE.MeshBasicMaterial({ color: 0x00aaff, transparent: true, opacity: 0.0, depthWrite: false })
    );
    glowPlane.position.set(0, 0, 0.01);

    const vid = document.getElementById('phone-video');
    const videoTex = new THREE.VideoTexture(vid);
    videoTex.minFilter = THREE.LinearFilter; videoTex.magFilter = THREE.LinearFilter;
    videoTex.generateMipmaps = false; videoTex.flipY = false; videoTex.encoding = THREE.sRGBEncoding;
    let videoReady = false;
    // iOS Safari: muted video CAN autoplay — play immediately then pause at frame 0
    // This decodes the first frame so the texture isn't black on load
    function bootVideo() {
      vid.play().then(() => {
        vid.currentTime = 0.001;
        // Let it run briefly so texture gets a real decoded frame, then pause
        setTimeout(() => {
          vid.pause();
          vid.currentTime = 0.001;
          videoReady = true;
        }, 80);
      }).catch(() => {
        // Gesture required — mark ready anyway and unlock on first touch
        videoReady = true;
      });
    }

    vid.addEventListener('loadedmetadata', bootVideo, { once: true });
    vid.addEventListener('loadeddata', () => { videoReady = true; }, { once: true });
    vid.addEventListener('canplaythrough', () => { videoReady = true; }, { once: true });

    // Fallback: unlock on first touch if autoplay was blocked
    function unlockVideo() {
      if (videoReady) return;
      vid.play().then(() => {
        setTimeout(() => { vid.pause(); vid.currentTime = 0.001; videoReady = true; }, 80);
      }).catch(() => { videoReady = true; });
    }
    ['touchstart','pointerdown','click'].forEach(e =>
      document.addEventListener(e, unlockVideo, { once: true, passive: true })
    );

    function remapUVs(mesh) {
      const pos = mesh.geometry.attributes.position;
      const box = new THREE.Box3().setFromBufferAttribute(pos);
      const size = new THREE.Vector3(); box.getSize(size);
      const meshW = size.y, meshH = size.z;
      const vidAR = (vid.videoWidth && vid.videoHeight) ? vid.videoWidth / vid.videoHeight : 576 / 1280;
      const meshAR = meshW / (meshH || 1);
      let scaleU = 1, scaleV = 1, offU = 0, offV = 0;
      if (meshAR > vidAR) { scaleV = meshAR / vidAR; offV = (1 - scaleV) / 2; }
      else { scaleU = vidAR / meshAR; offU = (1 - scaleU) / 2; }
      const uvArr = new Float32Array(pos.count * 2);
      for (let i = 0; i < pos.count; i++) {
        let u = (pos.getY(i) - box.min.y) / (meshW || 1);
        let v = (pos.getZ(i) - box.min.z) / (meshH || 1);
        u = 1 - (u * scaleU + offU); v = 1 - (v * scaleV + offV);
        uvArr[i*2] = u; uvArr[i*2+1] = v;
      }
      mesh.geometry = mesh.geometry.clone();
      mesh.geometry.setAttribute('uv', new THREE.BufferAttribute(uvArr, 2));
    }

    const phoneGroup = new THREE.Group();
    window.phoneGroup = phoneGroup;
    // Init to hero start position — corrected after setupScroll()
    const _isPortrait = () => window.innerWidth < window.innerHeight;
    const _phoneXOffset = () => _isPortrait() ? 0.0 : 0.005;
    const _startTilt = _isPortrait() ? 40 : 32;
    phoneGroup.position.set(_phoneXOffset(), _isPortrait() ? -0.7 : -1.4, 0);
    phoneGroup.rotation.set(-_startTilt * Math.PI / 180, 0, 0);
    camera.position.z = _isPortrait() ? 3.2 : 3.8;
    camera.fov = _isPortrait() ? 30 : 34;
    camera.updateProjectionMatrix();
    scene.add(phoneGroup);

    function lerp(a, b, t) { return a + (b - a) * t; }
    function eio(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

    const slideTitle = document.getElementById('slide-title');
    const slideTextEl = document.getElementById('slide-text');
    let currentSlideIdx = -1;

    const loader = new THREE.GLTFLoader();
    loader.load('https://cdn.star.io/models/iphone17.glb', (gltf) => {
      const model = gltf.scene;
      const isMobile = innerWidth < 768;
      model.scale.setScalar(isMobile ? 1.25 : 1.6);
      model.rotation.y = Math.PI / 2;
      model.traverse((child) => {
        if (!child.isMesh) return;
        const mats = Array.isArray(child.material) ? child.material : [child.material];
        mats.forEach((mat, idx) => {
          if (!mat) return; const name = mat.name || '';
          if (name === 'screen.001') {
            remapUVs(child);
            const vm = new THREE.MeshBasicMaterial({ map: videoTex, side: THREE.DoubleSide, toneMapped: false });
            if (Array.isArray(child.material)) child.material[idx] = vm; else child.material = vm; return;
          }
          if (name === 'glass.002' || name === 'lensinglass') { child.visible = false; return; }
          const body = ['basecolor.001','backpanel.001','Material.005','Material.006','Material.007','gray.001'];
          if (body.includes(name)) { mat.color?.set(0x1c1c1e); if (mat.metalness!==undefined){mat.metalness=0.7;mat.roughness=0.25;} window._phoneBodyMats = window._phoneBodyMats||[]; window._phoneBodyMats.push(mat); }
          if (name==='metalframe.002'||name==='metaL.001') { mat.color?.set(0x3a3a3c); if(mat.metalness!==undefined){mat.metalness=0.95;mat.roughness=0.1;} window._phoneFrameMats = window._phoneFrameMats||[]; window._phoneFrameMats.push(mat); }
          if (name==='black.002') mat.color?.set(0x000000);
        });
      });
      // Center model within group so phoneGroup.position is truly the phone center
      const bbox = new THREE.Box3().setFromObject(model);
      const center = new THREE.Vector3();
      bbox.getCenter(center);
      model.position.sub(center);

      phoneGroup.add(model);
      phoneGroup.add(glowPlane);

      if (!vid.videoWidth) {
        vid.addEventListener('loadedmetadata', () => {
          model.traverse(child => {
            if (!child.isMesh) return;
            const m = Array.isArray(child.material) ? child.material : [child.material];
            if (m.some(x => x && x.map === videoTex)) remapUVs(child);
          });
        }, { once: true });
      }

      document.getElementById('loading').style.opacity = '0';
      setTimeout(() => document.getElementById('loading')?.remove(), 600);

      setupScroll();
    }, null, err => { console.error(err); document.getElementById('loading').style.opacity='0'; });

    function setSlideText(title) {
      // Split into words, each wrapped for mask animation
      const lines = title.split('\n');
      slideTitle.innerHTML = lines.map(line =>
        line.split(' ').map(word =>
          `<span class="word"><span class="word-inner">${word}</span></span>`
        ).join(' ')
      ).join('<br>');
    }

    function setupScroll() {
      gsap.registerPlugin(ScrollTrigger);

      /* ══════════════════════════════════════════════
         HERO SECTION — tilt → upright (300vh)
         Phone starts: tilted ~−38° on Z, bottom-right off-canvas
         0→50% scroll: rises + straightens, copy stays
         50→100%: copy fades up, phone locks to resting pos
      ══════════════════════════════════════════════ */
      const heroCopy   = document.getElementById('hero-copy');
      const heroSect   = document.getElementById('hero-section');
      const logoEl     = document.getElementById('yolo-logo');

      // The GLTF model is rotated π/2 so its geometric center isn't at origin.
      const isPortrait = () => innerWidth < innerHeight;

      // Portrait: phone fully centered; landscape: slight right offset
      function phoneXOffset() {
        return isPortrait() ? 0.0 : 0.005;
      }

      // Portrait start: phone higher (-0.6), closer cam, 40° tilt (matches Figma)
      // Landscape start: phone low (-1.4), 32° tilt
      const startY   = isPortrait() ? -0.7  : -1.4;
      const startCamZ = isPortrait() ? 3.2   : 3.8;
      const startFov  = isPortrait() ? 30    : 34;
      const startTilt = isPortrait() ? 40    : 32;

      phoneGroup.position.set(phoneXOffset(), startY, 0);
      phoneGroup.rotation.set(-startTilt * Math.PI / 180, 0, 0);
      camera.position.z = startCamZ;
      camera.fov = startFov; camera.updateProjectionMatrix();

      // End: phone upright — portrait slightly closer for bigger feel
      const heroRest = {
        x: phoneXOffset(), y: 0.0, rotY: 0.0, rotZ: 0,
        camZ: isPortrait() ? 5.5 : 5.5,
        fov:  isPortrait() ? 36  : 36
      };

      ScrollTrigger.create({
        trigger: '#hero-section',
        start: 'top top',
        end: 'bottom top',
        scrub: 0.9,
        onUpdate(self) {
          const p = self.progress;
          const clamp01 = v => Math.min(1, Math.max(0, v));
          const eOut3   = t => 1 - Math.pow(1-t, 3);
          const eInOut  = t => t < 0.5 ? 2*t*t : -1+(4-2*t)*t;

          // Always keep phone centered and camera x=0 during hero
          phoneGroup.position.x = phoneXOffset();
          camera.position.x = 0;
          camera.position.y = 0;

          // Logo fades out on portrait as soon as scrolling begins (p 0→0.15)
          if (window.innerWidth < window.innerHeight) {
            const logoFade = clamp01(1 - p / 0.15);
            logoEl.style.opacity = String(logoFade);
          } else {
            logoEl.style.opacity = '1';
          }

          if (p <= 0.5) {
            // Phase 1: zoom out — camera pulls back, phone rises into full view
            const t = eOut3(p / 0.5);
            phoneGroup.position.y = lerp(startY, heroRest.y, t);
            phoneGroup.rotation.x = lerp(-startTilt * Math.PI / 180, 0, t);
            camera.position.z     = lerp(startCamZ, heroRest.camZ, t);
            camera.fov            = lerp(startFov,  heroRest.fov,  t);
            // Fade copy: starts at p=0.1, gone by p=0.28
            const fadeT = clamp01((p - 0.1) / 0.18);
            heroCopy.style.display   = 'flex';
            heroCopy.style.opacity   = String(1 - fadeT);
            heroCopy.style.transform = `translateY(${-fadeT * 36}px)`;
          } else {
            // Phase 2: copy gone, phone stays locked
            phoneGroup.position.y = heroRest.y;
            phoneGroup.rotation.x = 0;
            camera.position.z     = heroRest.camZ;
            camera.fov            = heroRest.fov;
            heroCopy.style.display   = 'flex';
            heroCopy.style.opacity   = '0';
            heroCopy.style.transform = `translateY(-36px)`;
          }

          // Scrub video through first 55% of its duration during hero
          if (videoReady && vid.duration) {
            const target = p * vid.duration * 0.55;
            if (Math.abs(vid.currentTime - target) > 0.04) vid.currentTime = target;
            videoTex.needsUpdate = true;
          }
          camera.updateProjectionMatrix();
        }
      });

      /* ══════════════════════════════════════════════
         Fade hero copy out when existing slides start — no display toggle,
         opacity only so scroll-back always restores it correctly
      ══════════════════════════════════════════════ */
      ScrollTrigger.create({
        trigger: '#sections',
        start: 'top top',
        end: 'top top',
        onEnter:     () => { heroCopy.style.opacity = '0'; heroCopy.style.pointerEvents = 'none'; },
        onEnterBack: () => { heroCopy.style.opacity = ''; heroCopy.style.pointerEvents = 'none'; }
      });

      // slide-text is hidden — no per-slide copy needed right now

      /* ══════════════════════════════════════════════
         WORD SCROLL SECTION
         "BUILT FOR SPEED" slides in from left (white)
         "DESIGNED FOR EDGE" slides in from right (green)
         Both start off-canvas, meet behind the centered phone.
      ══════════════════════════════════════════════ */
      const wl1 = document.getElementById('word-line-1');
      const wl2 = document.getElementById('word-line-2');

      // Word overlay: driven by raw scroll position — no GSAP, no sticky, no diagonal
      const wordSection  = document.getElementById('word-section');
      const wordOverlay  = document.getElementById('word-overlay');

      const heroSection = document.getElementById('hero-section');

      function updateWords() {
        const wordRect = wordSection.getBoundingClientRect();
        const heroRect = heroSection.getBoundingClientRect();
        const sectionH = wordSection.offsetHeight;
        const vh = window.innerHeight;

        // Start when the last 100vh of hero is scrolling (heroRect.top < -200vh)
        // End when word-section bottom leaves viewport top
        const heroH = heroSection.offsetHeight;  // 300vh
        // triggerStart: 100vh before word-section enters (i.e. last third of hero)
        const startScroll = heroSection.offsetTop + heroH - vh * 1.8;
        const endScroll   = wordSection.offsetTop + sectionH - vh;
        const currentScroll = window.scrollY;

        if (currentScroll < startScroll || currentScroll > endScroll) {
          wordOverlay.style.display = 'none';
          return;
        }
        wordOverlay.style.display = 'block';

        const p = Math.max(0, Math.min(1, (currentScroll - startScroll) / (endScroll - startScroll)));

        const W = window.innerWidth;
        const h = window.innerHeight;
        const lineH = wl1.offsetHeight || 100;
        const isPortrait = W < h;

        if (isPortrait) {
          // Portrait (mobile): line 1 above phone, line 2 below — scroll horizontally
          const phoneTop    = h * 0.22;   // rough top of phone area
          const phoneBottom = h * 0.78;   // rough bottom of phone area
          const y1 = phoneTop - lineH * 0.9;   // tight above phone
          const y2 = phoneBottom - lineH * 0.2; // slightly up

          const w1w = wl1.offsetWidth || W * 2;
          const w2w = wl2.offsetWidth || W * 2;
          const x1 = -w1w + p * (W + w1w);
          const x2 = W    - p * (W + w2w);

          wl1.style.transform = `translate(${x1}px, ${y1}px)`;
          wl2.style.transform = `translate(${x2}px, ${y2}px)`;
        } else {
          // Landscape: both lines centered vertically, scroll horizontally
          const y1 = h / 2 - lineH * 1.1;
          const y2 = h / 2 + lineH * 0.1;

          const w1w = wl1.offsetWidth || W * 2;
          const w2w = wl2.offsetWidth || W * 2;
          const x1 = -w1w + p * (W + w1w);
          const x2 = W    - p * (W + w2w);

          wl1.style.transform = `translate(${x1}px, ${y1}px)`;
          wl2.style.transform = `translate(${x2}px, ${y2}px)`;
        }
      }

      window.addEventListener('scroll', updateWords, { passive: true });
      updateWords();

      // Per-slide scroll trigger
      // Phone stays locked at heroRest for all remaining scroll — no more movement.
      // Video continues scrubbing through remaining duration across all slides.
      ScrollTrigger.create({
        trigger: '#sections',
        start: 'top top',
        end: 'bottom top',
        scrub: true,
        onUpdate(self) {
          // Lock phone at rest position
          phoneGroup.position.x = phoneXOffset();
          phoneGroup.position.y = heroRest.y;
          phoneGroup.rotation.z = 0;
          phoneGroup.rotation.y = heroRest.rotY;
          camera.position.x     = 0;
          camera.position.y     = 0;
          camera.position.z     = heroRest.camZ;
          camera.fov            = heroRest.fov;
          camera.updateProjectionMatrix();

          // Continue scrubbing video through remaining 45%
          if (videoReady && vid.duration) {
            const target = vid.duration * 0.55 + self.progress * vid.duration * 0.45;
            if (Math.abs(vid.currentTime - target) > 0.04) vid.currentTime = target;
            videoTex.needsUpdate = true;
          }
        }
      });

      /* ══════════════════════════════════════════════
         FEATURE SECTION — smooth interpolation from heroRest → tilted position
         scrub: true so progress drives the lerp (smooth in both directions)
      ══════════════════════════════════════════════ */
      ScrollTrigger.create({
        trigger: '#feature-section',
        start: 'top bottom',   // start lerping as section enters from bottom
        end: 'top top',        // fully transitioned when section top hits viewport top
        scrub: true,
        onUpdate(self) {
          const t = self.progress; // 0 = heroRest, 1 = feature target
          const eased = t < 0.5 ? 2*t*t : -1+(4-2*t)*t; // easeInOut
          const portrait = window.innerWidth < window.innerHeight;
          const deg = Math.PI / 180;

          if (portrait) {
            // Mobile: stay centered and upright
            phoneGroup.position.x = lerp(phoneXOffset(), 0, eased);
            phoneGroup.rotation.x = lerp(0, 0, eased);
            phoneGroup.rotation.y = lerp(heroRest.rotY, 0, eased);
            phoneGroup.rotation.z = lerp(0, 0, eased);
            camera.position.z     = lerp(heroRest.camZ, heroRest.camZ, eased);
            camera.fov            = lerp(heroRest.fov, heroRest.fov, eased);
          } else {
            // Desktop: lerp to Egert's tilt values (tuned 2026-03-31)
            phoneGroup.position.x = lerp(phoneXOffset(), 0.905, eased);
            phoneGroup.rotation.x = lerp(0, -3  * deg, eased);
            phoneGroup.rotation.y = lerp(heroRest.rotY, -47 * deg, eased);
            phoneGroup.rotation.z = lerp(0, -17 * deg, eased);
            camera.position.z     = lerp(heroRest.camZ, 5.6, eased);
            camera.fov            = lerp(heroRest.fov, 33, eased);
          }
          phoneGroup.position.y = lerp(heroRest.y, -0.03, eased);
          camera.position.x = 0;
          camera.position.y = 0;
          camera.updateProjectionMatrix();
        }
      });

      /* ── Feature section: scroll-driven active line ── */
      (function() {
        const featureSection = document.getElementById('feature-section');
        const lines = Array.from({length: 6}, (_, i) => document.getElementById('fl-' + i));
        const btnWrap = document.getElementById('feature-btn-wrap');
        const N = lines.length;

        function setActive(idx) {
          lines.forEach((el, i) => {
            if (!el) return;
            el.classList.toggle('active', i === idx);
          });
          // button always visible
        }

        setActive(0);

        function updateFeatureLines() {
          const rect = featureSection.getBoundingClientRect();
          const sectionH = featureSection.offsetHeight;
          const vh = window.innerHeight;
          const p = Math.max(0, Math.min(1, -rect.top / (sectionH - vh)));
          setActive(Math.min(N - 1, Math.floor(p * N)));
        }

        window.addEventListener('scroll', updateFeatureLines, { passive: true });
        updateFeatureLines();
      })();

    /* ── Section 4: Coming Soon Marquee ── */
    (function() {
      const track = document.getElementById('cs-marquee-track');
      const text  = '\u2022 COMING SOON ';
      // Fill with enough copies to cover 3× viewport width
      const copies = 12;
      for (let i = 0; i < copies; i++) {
        const span = document.createElement('span');
        span.className = 'cs-marquee-item';
        span.textContent = text;
        track.appendChild(span);
      }

      // Scatter decorative particles (diamond ◆ and cross ✕)
      const particleEl = document.getElementById('cs-particles');
      const shapes = ['◆', '✕', '◇', '×'];
      for (let i = 0; i < 22; i++) {
        const d = document.createElement('span');
        d.className = 'cs-particle';
        d.textContent = shapes[i % shapes.length];
        d.style.left  = Math.random() * 100 + '%';
        d.style.top   = Math.random() * 100 + '%';
        d.style.fontSize = (10 + Math.random() * 14) + 'px';
        d.style.opacity = (0.1 + Math.random() * 0.25).toFixed(2);
        particleEl.appendChild(d);
      }

      // Animate: continuous left scroll, seamless loop
      let offset = 0;
      const speed = 0.6; // px per frame
      let itemW = 0;

      function getItemW() {
        const first = track.querySelector('.cs-marquee-item');
        return first ? first.offsetWidth : 300;
      }

      function animateMarquee() {
        if (!itemW) itemW = getItemW();
        offset -= speed;
        // Reset after one full item width — seamless loop
        if (Math.abs(offset) >= itemW) offset += itemW;
        track.style.transform = `translateX(${offset}px)`;
        requestAnimationFrame(animateMarquee);
      }

      // Start after fonts load
      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(() => { itemW = getItemW(); animateMarquee(); });
      } else {
        setTimeout(() => { itemW = getItemW(); animateMarquee(); }, 500);
      }

      window.addEventListener('resize', () => { itemW = getItemW(); });
    })();

    // Feature lines are now Figma SVG divs — no layout adjustment needed

    // No mouse parallax — phone rotation stays exactly where scroll puts it
    let glintAngle = 0, lastTime = 0;

    (function render(now) {
      requestAnimationFrame(render);
      const dt = Math.min((now - lastTime) / 1000, 0.05); lastTime = now;
      glintAngle += dt * 0.4;
      glint.position.set(Math.sin(glintAngle)*3.5, Math.cos(glintAngle*0.7)*2, 3);
      const t2 = now / 1000;
      glowPlane.material.opacity = 0.04 + Math.sin(t2 * 1.2) * 0.02;

      // Always keep camera centered — no lateral drift ever
      camera.position.x = 0;
      camera.position.y = 0;
      // On portrait, force phone to horizontal center every frame
      if (window.innerWidth < window.innerHeight) {
        phoneGroup.position.x = 0;
      }

      renderer.render(scene, camera);
    })(0);

    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      ScrollTrigger.refresh();
    });
    // Video unlock handled above (unlockVideo)
    } // end setupScroll
  </script>

      <label style="font-size:11px;opacity:0.6">Custom:</label>
      <input type="color" id="dbg-body-color" value="#1c1c1e"
        style="width:32px;height:22px;padding:1px;border:1px solid #555;border-radius:4px;background:none;cursor:pointer">
      <input type="color" id="dbg-frame-color" value="#3a3a3c"
        style="width:32px;height:22px;padding:1px;border:1px solid #555;border-radius:4px;background:none;cursor:pointer">
      <span style="font-size:10px;opacity:0.5">body / frame</span>
    </div>
  </div>
  <button onclick="
    const v={x:+dbg_x.value,y:+dbg_y.value,rx:+dbg_rx.value,ry:+dbg_ry.value,rz:+dbg_rz.value,camZ:+dbg_camz.value,fov:+dbg_fov.value};
    prompt('Copy these values:',JSON.stringify(v));
  " style="width:100%;padding:5px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:5px;color:#fff;cursor:pointer;font:11px monospace">
    Copy values
  </button>
</div>
<script>
(function() {
  function $(id) { return document.getElementById(id); }
  const sliders = [
    { id:'dbg-x',    val:'dbg-x-val',    apply: v => { if(window.phoneGroup) window.phoneGroup.position.x = v; } },
    { id:'dbg-y',    val:'dbg-y-val',    apply: v => { if(window.phoneGroup) window.phoneGroup.position.y = v; } },
    { id:'dbg-rx',   val:'dbg-rx-val',   apply: v => { if(window.phoneGroup) window.phoneGroup.rotation.x = v*Math.PI/180; } },
    { id:'dbg-ry',   val:'dbg-ry-val',   apply: v => { if(window.phoneGroup) window.phoneGroup.rotation.y = v*Math.PI/180; } },
    { id:'dbg-rz',   val:'dbg-rz-val',   apply: v => { if(window.phoneGroup) window.phoneGroup.rotation.z = v*Math.PI/180; } },
    { id:'dbg-camz', val:'dbg-camz-val', apply: v => { if(window.camera) { window.camera.position.z = v; window.camera.updateProjectionMatrix(); } } },
    { id:'dbg-fov',  val:'dbg-fov-val',  apply: v => { if(window.camera) { window.camera.fov = v; window.camera.updateProjectionMatrix(); } } },
  ];
  // expose globals for debug (set after model loads)
  window._dbgOverride = false;

  window.setPhoneColor = function(body, frame) {
    (window._phoneBodyMats||[]).forEach(m => m.color?.set(body));
    (window._phoneFrameMats||[]).forEach(m => m.color?.set(frame));
    document.getElementById('dbg-body-color').value = body;
    document.getElementById('dbg-frame-color').value = frame;
  };

  document.getElementById('dbg-body-color').addEventListener('input', e => {
    (window._phoneBodyMats||[]).forEach(m => m.color?.set(e.target.value));
  });
  document.getElementById('dbg-frame-color').addEventListener('input', e => {
    (window._phoneFrameMats||[]).forEach(m => m.color?.set(e.target.value));
  });

  sliders.forEach(s => {
    const el = $(s.id);
    if (!el) return;
    el.addEventListener('input', () => {
      const v = +el.value;
      $(s.val).textContent = v;
      window._dbgOverride = true;
      s.apply(v);
    });
  });
})();
</script>
</body>
</html>
