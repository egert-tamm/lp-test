<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>star</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #000; }
    #bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      object-fit: cover;
      filter: blur(40px);
      transform: scale(1.15);
      pointer-events: none;
    }
    #fg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      object-fit: contain;
    }
    #bg-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.3);
      z-index: 1;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <video id="bg-video" autoplay muted loop playsinline>
    <source src="https://cdn.star.io/videos/part-1_10_compressed_26-03-28.mp4" type="video/mp4">
  </video>
  <div id="bg-overlay"></div>
  <video id="fg-video" autoplay muted loop playsinline>
    <source src="https://cdn.star.io/videos/part-1_10_compressed_26-03-28.mp4" type="video/mp4">
  </video>
  <script>
    const bg = document.getElementById('bg-video');
    const fg = document.getElementById('fg-video');
    fg.addEventListener('timeupdate', () => {
      if (Math.abs(bg.currentTime - fg.currentTime) > 0.3) {
        bg.currentTime = fg.currentTime;
      }
    });
  </script>
</body>
</html>
