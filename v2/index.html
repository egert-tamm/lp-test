<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>star.io — The Gaming &amp; Payments Platform</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 400vh;
      background: #080808;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    #canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    #content {
      position: relative;
      z-index: 1;
      pointer-events: none;
    }

    #content a, #content button { pointer-events: auto; }

    section {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 4rem;
    }

    .hero {
      min-height: 100vh;
      justify-content: flex-start;
      align-items: flex-end;
      padding-bottom: 8rem;
    }

    .hero .text-block {
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 2.5rem 3rem;
      max-width: 640px;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeInUp 1s ease 0.4s forwards;
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .hero p {
      margin-top: 1rem;
      font-size: 1.1rem;
      color: rgba(255,255,255,0.6);
    }

    .mid {
      min-height: 100vh;
      margin-top: 50vh;
      justify-content: flex-end;
    }

    .mid .text-block {
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 2.5rem 3rem;
      max-width: 540px;
      text-align: right;
    }

    .mid h2 {
      font-size: clamp(1.5rem, 3.5vw, 2.5rem);
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: -0.01em;
    }

    .cta-section {
      min-height: 100vh;
      margin-top: 50vh;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .cta-section .text-block { text-align: center; }

    .cta-button {
      display: inline-block;
      padding: 1rem 3rem;
      background: #fff;
      color: #080808;
      text-decoration: none;
      border-radius: 999px;
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      pointer-events: auto;
    }

    .cta-button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 40px rgba(255,255,255,0.15);
    }

    @keyframes fadeInUp {
      to { opacity: 1; transform: translateY(0); }
    }

    #loading {
      position: fixed;
      inset: 0;
      background: #080808;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: opacity 0.5s ease;
    }

    #loading .spinner {
      width: 40px; height: 40px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: rgba(255,255,255,0.6);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #phone-video {
      position: fixed;
      width: 1px; height: 1px;
      opacity: 0;
      pointer-events: none;
      top: 0; left: 0;
    }
  </style>
</head>
<body>

  <div id="loading"><div class="spinner"></div></div>

  <video id="phone-video"
    src="https://cdn.star.io/videos/screen-recording.mp4"
    autoplay muted loop playsinline
    crossorigin="anonymous">
  </video>

  <canvas id="canvas"></canvas>

  <div id="content">
    <section class="hero">
      <div class="text-block">
        <h1>The Gaming &amp; Payments Platform</h1>
        <p>Powering the next generation of iGaming infrastructure.</p>
      </div>
    </section>

    <section class="mid">
      <div class="text-block">
        <h2>Built for operators.<br>Designed for players.</h2>
      </div>
    </section>

    <section class="cta-section">
      <div class="text-block">
        <a href="mailto:hello@star.io" class="cta-button">Book a Demo →</a>
      </div>
    </section>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

  <script>
    // ─── Scene ───
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x080808);

    const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.01, 100);
    camera.position.set(0, 0, 4);

    const renderer = new THREE.WebGLRenderer({
      canvas: document.getElementById('canvas'),
      antialias: true,
      alpha: false
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x080808, 1);
    renderer.outputEncoding = THREE.sRGBEncoding;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    renderer.physicallyCorrectLights = true;

    // ─── Lighting ───
    const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
    scene.add(ambientLight);

    const keyLight = new THREE.DirectionalLight(0xffffff, 2.0);
    keyLight.position.set(2, 4, 5);
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight(0xaac8ff, 1.0);
    fillLight.position.set(-4, 1, -2);
    scene.add(fillLight);

    const rimLight = new THREE.DirectionalLight(0xffffff, 0.8);
    rimLight.position.set(0, -3, -3);
    scene.add(rimLight);

    // ─── Video Texture ───
    const videoEl = document.getElementById('phone-video');
    const videoTexture = new THREE.VideoTexture(videoEl);
    videoTexture.minFilter = THREE.LinearFilter;
    videoTexture.magFilter = THREE.LinearFilter;
    videoTexture.encoding = THREE.sRGBEncoding;

    // ─── Wrapper group for scroll animation ───
    const phoneGroup = new THREE.Group();
    phoneGroup.position.x = 1.2;
    phoneGroup.rotation.y = 0.5;   // slight angle, now from front
    phoneGroup.rotation.x = 0.15;
    scene.add(phoneGroup);

    // ─── Load GLB ───
    const loader = new THREE.GLTFLoader();
    loader.load(
      'https://cdn.star.io/models/iphone17.glb',
      (gltf) => {
        const model = gltf.scene;

        // Scale up to fill the viewport nicely
        model.scale.set(1.5, 1.5, 1.5);

        // Model loads back-facing — flip to show screen
        model.rotation.y = Math.PI;

        // Replace materials
        model.traverse((child) => {
          if (child.isMesh) {
            const mat = child.material;
            if (!mat) return;

            const name = (mat.name || '').toLowerCase();

            // Screen → video texture — match any mesh that looks like a screen
            if (name.includes('screen')) {
              child.material = new THREE.MeshBasicMaterial({
                map: videoTexture,
                side: THREE.DoubleSide
              });
            }

            // Recolor orange body materials → dark titanium
            const orangeNames = ['basecolor.001', 'metalframe.002', 'backpanel.001', 'material.005', 'material.006', 'material.007'];
            if (orangeNames.includes(name)) {
              mat.color.set(0x1c1c1e);
              mat.metalness = 0.85;
              mat.roughness = 0.15;
            }
          }
        });

        phoneGroup.add(model);

        // Hide loader
        const loading = document.getElementById('loading');
        loading.style.opacity = '0';
        setTimeout(() => loading.remove(), 500);

        // ─── Scroll Animation ───
        gsap.registerPlugin(ScrollTrigger);

        const tl = gsap.timeline({
          scrollTrigger: {
            trigger: 'body',
            start: 'top top',
            end: 'bottom bottom',
            scrub: 1.2
          }
        });

        // Phase 1 (0–33%): rotate to face camera, slide to center
        tl.to(phoneGroup.rotation, { y: 0, x: 0, duration: 1 }, 0)
          .to(phoneGroup.position, { x: 0, duration: 1 }, 0);

        // Phase 2 (33–66%): slow spin + slight zoom
        tl.to(phoneGroup.rotation, { y: Math.PI * 2, duration: 1 }, 1)
          .to(phoneGroup.scale, { x: 1.15, y: 1.15, z: 1.15, duration: 1 }, 1);

        // Phase 3 (66–100%): tilt, slide to left, scale back
        tl.to(phoneGroup.rotation, { y: 0.5, x: -0.15, duration: 1 }, 2)
          .to(phoneGroup.position, { x: -1.2, duration: 1 }, 2)
          .to(phoneGroup.scale, { x: 1, y: 1, z: 1, duration: 1 }, 2);

        // Force video playback — must be in DOM and visible (not display:none) for iOS
        videoEl.load();
        videoEl.play().catch(() => {});
      },
      (xhr) => {
        // progress — optional
      },
      (err) => {
        console.error('GLB load error:', err);
        document.getElementById('loading').style.opacity = '0';
      }
    );

    // ─── Fallback video start on interaction ───
    ['click', 'touchstart'].forEach(evt => {
      document.addEventListener(evt, () => videoEl.play().catch(() => {}), { once: true });
    });

    // ─── Render Loop ───
    function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }
    animate();

    // ─── Resize ───
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
